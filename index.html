<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>Viáticos · Control de gastos · Casa Zapata</title>
<style>
/* ============================================
   VIÁTICOS — Sistema de control de gastos
   Estética: fintech moderna oscura
   ============================================ */

/* Fonts */
@import url("https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap");

:root {
  /* Colors — dark fintech */
  --bg: #0a0b0f;
  --bg-2: #101218;
  --surface: #14171f;
  --surface-2: #1a1e28;
  --surface-3: #232836;
  --border: #242a38;
  --border-2: #2e3548;
  --border-strong: #3a4358;

  --text: #e7eaf1;
  --text-2: #a4adc1;
  --text-3: #6f7891;
  --text-dim: #4f566b;

  /* Accent — verde lima fintech default */
  --accent: oklch(0.85 0.18 130);
  --accent-2: oklch(0.78 0.18 130);
  --accent-fg: #0a0b0f;
  --accent-soft: oklch(0.85 0.18 130 / 0.14);

  /* Semantic */
  --success: oklch(0.78 0.16 155);
  --success-soft: oklch(0.78 0.16 155 / 0.14);
  --warn: oklch(0.83 0.16 80);
  --warn-soft: oklch(0.83 0.16 80 / 0.14);
  --danger: oklch(0.72 0.18 25);
  --danger-soft: oklch(0.72 0.18 25 / 0.14);
  --info: oklch(0.78 0.14 240);
  --info-soft: oklch(0.78 0.14 240 / 0.14);

  /* Density */
  --row-h: 52px;
  --pad-card: 24px;
  --pad-cell: 14px 16px;

  /* Radii */
  --r-sm: 6px;
  --r: 10px;
  --r-lg: 14px;
  --r-xl: 20px;

  /* Type */
  --f-display: "Inter Tight", system-ui, sans-serif;
  --f-body: "Inter", system-ui, sans-serif;
  --f-mono: "JetBrains Mono", ui-monospace, monospace;
}

[data-density="compact"] {
  --row-h: 40px;
  --pad-card: 18px;
  --pad-cell: 8px 12px;
}

[data-theme="light"] {
  --bg: #f6f7f9;
  --bg-2: #eef0f4;
  --surface: #ffffff;
  --surface-2: #f7f8fa;
  --surface-3: #eef0f4;
  --border: #e3e6ec;
  --border-2: #d6dae3;
  --border-strong: #b9c0cd;
  --text: #11131a;
  --text-2: #4a5269;
  --text-3: #6b7388;
  --text-dim: #9aa1b3;
  --accent-fg: #0a0b0f;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--f-body);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* Subtle starfield-y bg */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(1200px 600px at 80% -10%, oklch(0.85 0.18 130 / 0.04), transparent 60%),
    radial-gradient(900px 500px at -10% 100%, oklch(0.7 0.15 240 / 0.04), transparent 60%);
  z-index: 0;
}
[data-theme="light"] body::before {
  background:
    radial-gradient(1200px 600px at 80% -10%, oklch(0.85 0.18 130 / 0.08), transparent 60%),
    radial-gradient(900px 500px at -10% 100%, oklch(0.7 0.15 240 / 0.06), transparent 60%);
}

/* ============ APP SHELL ============ */
.app {
  display: grid;
  grid-template-columns: 244px 1fr;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 18px 14px;
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px 18px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.brand-mark {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--accent);
  display: grid; place-items: center;
  color: var(--accent-fg);
  font-family: var(--f-display);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.02em;
}
.brand-name {
  font-family: var(--f-display);
  font-weight: 600;
  font-size: 17px;
  letter-spacing: -0.02em;
}
.brand-sub {
  font-size: 11px;
  color: var(--text-3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-top: 1px;
}

.nav-section {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  padding: 14px 10px 6px;
  font-weight: 600;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--r-sm);
  cursor: pointer;
  font-size: 13.5px;
  color: var(--text-2);
  border: 1px solid transparent;
  user-select: none;
  transition: background 0.12s, color 0.12s;
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active {
  background: var(--accent-soft);
  color: var(--text);
  border-color: oklch(from var(--accent) l c h / 0.22);
}
.nav-item .ico {
  width: 16px; height: 16px;
  flex-shrink: 0;
  opacity: 0.85;
}
.nav-item .badge {
  margin-left: auto;
  font-size: 10.5px;
  background: var(--accent);
  color: var(--accent-fg);
  padding: 1px 6px;
  border-radius: 99px;
  font-weight: 600;
  font-family: var(--f-mono);
}

/* Role pill in sidebar bottom */
.user-card {
  margin-top: auto;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--surface-2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), oklch(from var(--accent) calc(l - 0.15) c h));
  color: var(--accent-fg);
  display: grid; place-items: center;
  font-weight: 600;
  font-size: 12.5px;
  font-family: var(--f-display);
  flex-shrink: 0;
}
.avatar.lg { width: 40px; height: 40px; font-size: 14px; }
.avatar.sm { width: 26px; height: 26px; font-size: 10px; }
.user-card-name { font-weight: 500; font-size: 13px; }
.user-card-role { font-size: 11px; color: var(--text-3); text-transform: capitalize; }

/* ============ MAIN ============ */
.main {
  min-width: 0;
  display: flex;
  flex-direction: column;
}
.topbar {
  height: 60px;
  border-bottom: 1px solid var(--border);
  background: color-mix(in oklch, var(--bg) 70%, transparent);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 16px;
  position: sticky; top: 0;
  z-index: 10;
}
.crumbs {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-3);
}
.crumbs strong { color: var(--text); font-weight: 500; }
.crumbs .sep { color: var(--text-dim); }
.topbar-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 10px;
}

.search {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 7px 12px;
  width: 280px;
  font-size: 13px;
}
.search input {
  background: none;
  border: none;
  color: var(--text);
  flex: 1;
  font-family: inherit;
  font-size: 13px;
  outline: none;
}
.search input::placeholder { color: var(--text-dim); }
.kbd {
  font-family: var(--f-mono);
  font-size: 10.5px;
  border: 1px solid var(--border-2);
  background: var(--surface-2);
  border-radius: 4px;
  padding: 1px 5px;
  color: var(--text-3);
}

.content {
  padding: 28px;
  flex: 1;
  min-width: 0;
}

.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 22px;
  gap: 16px;
  flex-wrap: wrap;
}
.page-title {
  font-family: var(--f-display);
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.025em;
  margin: 0;
  line-height: 1.15;
}
.page-sub { color: var(--text-3); margin-top: 4px; font-size: 13.5px; }

/* ============ KPI CARDS ============ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 22px;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.kpi-label {
  font-size: 12px;
  color: var(--text-3);
  font-weight: 500;
  letter-spacing: 0.01em;
}
.kpi-value {
  font-family: var(--f-display);
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
}
.kpi-delta {
  font-size: 11.5px;
  margin-top: 8px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: var(--f-mono);
}
.kpi-delta.up { color: var(--success); }
.kpi-delta.down { color: var(--danger); }
.kpi-delta.neutral { color: var(--text-3); }
.kpi-spark {
  position: absolute;
  right: 16px; top: 18px;
  width: 80px; height: 36px;
  opacity: 0.75;
}

/* ============ CARDS ============ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: var(--pad-card);
}
.card-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}
.card-title {
  font-family: var(--f-display);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0;
}
.card-sub { font-size: 12px; color: var(--text-3); }

/* ============ BUTTONS ============ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: var(--r);
  border: 1px solid var(--border-2);
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, transform 0.06s;
  white-space: nowrap;
}
.btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
.btn:active { transform: translateY(1px); }
.btn.primary {
  background: var(--accent);
  color: var(--accent-fg);
  border-color: var(--accent);
  font-weight: 600;
}
.btn.primary:hover { background: oklch(from var(--accent) calc(l - 0.04) c h); border-color: oklch(from var(--accent) calc(l - 0.04) c h); }
.btn.ghost { background: none; border-color: transparent; color: var(--text-2); }
.btn.ghost:hover { background: var(--surface-2); color: var(--text); }
.btn.danger {
  background: var(--danger-soft);
  border-color: oklch(from var(--danger) l c h / 0.4);
  color: var(--danger);
}
.btn.danger:hover { background: oklch(from var(--danger) l c h / 0.22); }
.btn.success {
  background: var(--success-soft);
  border-color: oklch(from var(--success) l c h / 0.4);
  color: var(--success);
}
.btn.success:hover { background: oklch(from var(--success) l c h / 0.22); }
.btn.sm { padding: 5px 10px; font-size: 12px; }
.btn.icon { padding: 8px; width: 34px; justify-content: center; }
.btn[disabled] { opacity: 0.45; cursor: not-allowed; }

/* ============ STATUS BADGES & STEPPER ============ */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px;
  border-radius: 99px;
  font-size: 11.5px;
  font-weight: 500;
  font-family: var(--f-body);
  border: 1px solid transparent;
  white-space: nowrap;
  letter-spacing: 0.005em;
}
.badge .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor;
}
.badge.solicitado { background: var(--info-soft); color: var(--info); border-color: oklch(from var(--info) l c h / 0.3); }
.badge.autorizado { background: var(--warn-soft); color: var(--warn); border-color: oklch(from var(--warn) l c h / 0.3); }
.badge.liberado { background: var(--accent-soft); color: var(--accent); border-color: oklch(from var(--accent) l c h / 0.3); }
.badge.comprobado { background: var(--success-soft); color: var(--success); border-color: oklch(from var(--success) l c h / 0.3); }
.badge.rechazado { background: var(--danger-soft); color: var(--danger); border-color: oklch(from var(--danger) l c h / 0.3); }
.badge.parcial { background: oklch(from var(--text-3) l c h / 0.15); color: var(--text-2); border-color: oklch(from var(--text-3) l c h / 0.3); }
.badge.tipo { background: var(--surface-3); color: var(--text-2); border-color: var(--border-2); font-family: var(--f-mono); font-size: 10.5px; padding: 2px 7px; }

/* Stepper horizontal */
.stepper {
  display: flex;
  align-items: center;
  gap: 0;
  width: 100%;
}
.stepper .step {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  position: relative;
  padding: 6px 4px;
}
.stepper .dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 1.5px solid var(--border-2);
  display: grid; place-items: center;
  font-family: var(--f-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-3);
  z-index: 2;
  position: relative;
  transition: all 0.2s;
}
.stepper .label {
  font-size: 11.5px;
  margin-top: 6px;
  color: var(--text-3);
  white-space: nowrap;
  font-weight: 500;
}
.stepper .meta {
  font-size: 10.5px;
  color: var(--text-dim);
  font-family: var(--f-mono);
  margin-top: 2px;
}
.stepper .step::after {
  content: "";
  position: absolute;
  height: 1.5px;
  background: var(--border-2);
  top: 20px;
  left: 50%;
  right: -50%;
  z-index: 1;
}
.stepper .step:last-child::after { display: none; }

.stepper .step.done .dot,
.stepper .step.active .dot {
  background: var(--accent);
  color: var(--accent-fg);
  border-color: var(--accent);
}
.stepper .step.done::after { background: var(--accent); }
.stepper .step.done .label,
.stepper .step.active .label { color: var(--text); }
.stepper .step.active .dot {
  box-shadow: 0 0 0 4px oklch(from var(--accent) l c h / 0.18);
  animation: pulse 1.8s ease-in-out infinite;
}
.stepper .step.rejected .dot {
  background: var(--danger);
  color: white;
  border-color: var(--danger);
}
.stepper .step.rejected .label { color: var(--danger); }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 4px oklch(from var(--accent) l c h / 0.18); }
  50% { box-shadow: 0 0 0 7px oklch(from var(--accent) l c h / 0.08); }
}

/* ============ TABLES ============ */
.table-wrap {
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--surface);
  overflow: hidden;
}
table.t {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.t thead th {
  text-align: left;
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-3);
  padding: 12px 16px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.t tbody td {
  padding: var(--pad-cell);
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.t tbody tr:last-child td { border-bottom: none; }
.t tbody tr { transition: background 0.08s; cursor: pointer; }
.t tbody tr:hover { background: var(--surface-2); }
.t tbody tr.selected { background: var(--accent-soft); }
.t .num { font-family: var(--f-mono); font-variant-numeric: tabular-nums; text-align: right; }
.t .id-cell { font-family: var(--f-mono); font-size: 12px; color: var(--text-2); }
.t .muted { color: var(--text-3); }
.t .right { text-align: right; }

/* Filter bar */
.filterbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.chip {
  padding: 6px 12px;
  border-radius: 99px;
  border: 1px solid var(--border-2);
  background: var(--surface);
  color: var(--text-2);
  font-size: 12.5px;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.12s;
}
.chip:hover { color: var(--text); border-color: var(--border-strong); }
.chip.active { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); font-weight: 500; }
.chip .count {
  font-family: var(--f-mono);
  font-size: 11px;
  background: oklch(from var(--text) l c h / 0.08);
  padding: 0 6px;
  border-radius: 99px;
}
.chip.active .count { background: oklch(from var(--accent-fg) l c h / 0.15); }

/* ============ FORM ELEMENTS ============ */
.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field label {
  font-size: 12px;
  color: var(--text-2);
  font-weight: 500;
}
.field .hint { font-size: 11px; color: var(--text-3); }
.input, .select, .textarea {
  background: var(--bg-2);
  border: 1px solid var(--border-2);
  border-radius: var(--r);
  padding: 9px 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 13.5px;
  outline: none;
  transition: border-color 0.12s, background 0.12s;
}
.input:focus, .select:focus, .textarea:focus {
  border-color: var(--accent);
  background: var(--surface);
}
.input::placeholder, .textarea::placeholder { color: var(--text-dim); }
.textarea { min-height: 80px; resize: vertical; font-family: inherit; }

.form-grid {
  display: grid;
  gap: 16px;
}
.form-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.form-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }

/* ============ DROP ZONE ============ */
.dropzone {
  border: 1.5px dashed var(--border-strong);
  border-radius: var(--r-lg);
  padding: 28px;
  text-align: center;
  background: var(--surface-2);
  transition: all 0.15s;
  cursor: pointer;
}
.dropzone:hover, .dropzone.drag {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.dropzone-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  margin: 0 auto 12px;
  display: grid; place-items: center;
  color: var(--accent);
}
.dropzone-title { font-weight: 600; font-size: 14px; }
.dropzone-sub { color: var(--text-3); font-size: 12px; margin-top: 4px; }

/* File chip */
.file-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-size: 12.5px;
}
.file-chip .icon-box {
  width: 30px; height: 30px;
  border-radius: 6px;
  background: var(--surface-3);
  display: grid; place-items: center;
  font-family: var(--f-mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  flex-shrink: 0;
}
.file-chip .meta { flex: 1; min-width: 0; }
.file-chip .name { color: var(--text); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-chip .sz { color: var(--text-3); font-family: var(--f-mono); font-size: 11px; }

/* ============ TIMELINE ============ */
.timeline {
  display: flex;
  flex-direction: column;
  gap: 12px;
  position: relative;
}
.timeline::before {
  content: "";
  position: absolute;
  left: 11px;
  top: 6px;
  bottom: 6px;
  width: 1.5px;
  background: var(--border-2);
}
.tl-row {
  display: grid;
  grid-template-columns: 24px 1fr;
  gap: 12px;
  align-items: flex-start;
  position: relative;
}
.tl-dot {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 2px solid var(--border-2);
  display: grid; place-items: center;
  z-index: 2;
  position: relative;
  font-size: 10px;
  color: var(--text-3);
}
.tl-dot.done {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-fg);
}
.tl-dot.rejected { background: var(--danger); border-color: var(--danger); color: white; }
.tl-content { padding-bottom: 8px; }
.tl-title { font-weight: 500; font-size: 13.5px; }

.tl-note { font-size: 12.5px; color: var(--text-2); margin-top: 6px; padding: 8px 10px; background: var(--surface-2); border-radius: 6px; border-left: 2px solid var(--border-strong); }

.segmented {
  display: inline-flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 3px;
  gap: 2px;
}
.segmented button {
  background: none;
  border: none;
  color: var(--text-2);
  font-family: inherit;
  font-size: 12.5px;
  padding: 5px 12px;
  border-radius: calc(var(--r) - 3px);
  cursor: pointer;
  font-weight: 500;
  transition: all 0.12s;
  display: inline-flex; align-items: center; gap: 6px;
}
.segmented button:hover { color: var(--text); }
.segmented button.on {
  background: var(--accent);
  color: var(--accent-fg);
  font-weight: 600;
}

/* ============ CHARTS (CSS-only) ============ */
.chart-bars {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  height: 180px;
  padding: 10px 0;
}
.chart-bar {
  flex: 1;
  background: linear-gradient(180deg, var(--accent), oklch(from var(--accent) calc(l - 0.18) c h));
  border-radius: 4px 4px 0 0;
  position: relative;
  min-height: 4px;
  transition: opacity 0.15s;
  cursor: pointer;
}
.chart-bar:hover { opacity: 0.85; }
.chart-bar .v {
  position: absolute;
  top: -18px; left: 50%; transform: translateX(-50%);
  font-size: 10.5px;
  font-family: var(--f-mono);
  color: var(--text-2);
  white-space: nowrap;
}
.chart-axis {
  display: flex; gap: 8px;
  font-size: 10.5px; color: var(--text-3);
  font-family: var(--f-mono);
  margin-top: 8px;
  border-top: 1px solid var(--border);
  padding-top: 8px;
}
.chart-axis span { flex: 1; text-align: center; }

.donut {
  width: 140px; height: 140px;
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}
.donut::after {
  content: "";
  position: absolute;
  inset: 18px;
  border-radius: 50%;
  background: var(--surface);
}
.donut-center {
  position: absolute;
  inset: 0;
  display: grid; place-items: center;
  z-index: 2;
  text-align: center;
}
.donut-center .v {
  font-family: var(--f-display);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.donut-center .l { font-size: 10.5px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }

  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;

.aging {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
}
.aging .lbl {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.aging .v {
  font-family: var(--f-display);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}
.aging .c { font-size: 11px; color: var(--text-3); margin-top: 2px; font-family: var(--f-mono); }
.aging .bar { height: 4px; background: var(--accent); border-radius: 2px; margin-top: 10px; }
.aging.warn .bar { background: var(--warn); }
.aging.danger .bar { background: var(--danger); }
.aging.danger .v { color: var(--danger); }
.aging.warn .v { color: var(--warn); }

  justify-content: center;
  padding: 30px;
  min-height: 100vh;
}
.phone {
  width: 390px;
  height: 780px;
  background: var(--bg);
  border: 12px solid #1a1d26;
  border-radius: 44px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1.5px #2a2f3d;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}
.phone-status {
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  font-family: var(--f-mono);
  font-size: 12px;
  color: var(--text);
  background: var(--bg);
  flex-shrink: 0;
}
.phone-notch {
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 110px; height: 26px;
  background: #0a0b0f;
  border-radius: 0 0 16px 16px;
  z-index: 5;
}
.phone-screen {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.phone-screen::-webkit-scrollbar { width: 0; }
.phone-tabs {
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 6px 6px 16px;
  flex-shrink: 0;
}
.phone-tab {
  flex: 1;
  padding: 8px 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  font-size: 10.5px;
  color: var(--text-3);
  cursor: pointer;
  border-radius: 8px;

.phone-tab.on { color: var(--accent); }
.phone-tab.on .icw { background: var(--accent-soft); }
.icw {
  width: 28px; height: 28px;
  border-radius: 8px;
  display: grid; place-items: center;

.m-pad { padding: 16px; }
.m-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  margin-bottom: 10px;

.m-balance {

.row { display: flex; align-items: center; gap: 10px; }
.col { display: flex; flex-direction: column; gap: 4px; }
.spread { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.muted { color: var(--text-3); }

.mono { font-family: var(--f-mono); }
.center { text-align: center; }
.right { text-align: right; }
.label-tag {

  letter-spacing: 0.08em;
  color: var(--text-3);
  font-weight: 600;

.two-col {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 18px;
}
@media (max-width: 1100px) {
  .two-col { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}

/* Drill-down modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: oklch(0 0 0 / 0.6);
  backdrop-filter: blur(4px);
  z-index: 50;
  display: grid;
  place-items: center;
  padding: 30px;
  animation: fadeIn 0.15s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  width: min(900px, 100%);
  max-height: 86vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}
.modal-head {
  padding: 18px 22px;

}

.modal-title { font-family: var(--f-display); font-size: 18px; font-weight: 600; letter-spacing: -0.02em; margin: 0; }
.icon-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: grid; place-items: center;
  cursor: pointer;
  border: 1px solid var(--border-2);
  background: var(--surface);
  color: var(--text-2);
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); }

/* Confidence bar */
.conf {

  font-size: 11px;
  font-family: var(--f-mono);
  color: var(--text-2);
}
.conf .meter {
  width: 50px; height: 5px;
  background: var(--surface-3);
  border-radius: 3px;
  overflow: hidden;
}
.conf .fill { height: 100%; background: var(--accent); }
.conf.warn .fill { background: var(--warn); }

/* Sparkline */
.spark {
  display: block;
  width: 100%; height: 36px;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-3);
}
.empty-ic {
  width: 48px; height: 48px;
  border-radius: 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  margin: 0 auto 12px;
  display: grid; place-items: center;

/* Compact density tweaks */
[data-density="compact"] .kpi { padding: 14px 16px; }
[data-density="compact"] .kpi-value { font-size: 22px; }
[data-density="compact"] .card-head { margin-bottom: 12px; }
[data-density="compact"] .card-title { font-size: 14px; }

/* Scrollbar */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: var(--bg); }
*::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 5px; }
*::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  const token = Math.random().toString(36).slice(2, 10).toUpperCase();
  window.AUTH_TOKENS[correo] = { token, expires: Date.now() + 15 * 60000 };
  return token;
}
function verifyToken(correo, token) {
  const rec = window.AUTH_TOKENS[correo];
  if (!rec) return false;
  if (Date.now() > rec.expires) { delete window.AUTH_TOKENS[correo]; return false; }
  return rec.token === token.toUpperCase();
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {

function TweakToggle({ label, value, onChange }) {

      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

function Stepper({ status, dates }) {
  const steps = [
    { key: "solicitado", label: "Solicitado" },
    { key: "autorizado", label: "Autorizado" },
    { key: "liberado", label: "Liberado" },
    { key: "comprobado", label: "Comprobado" },
  ];
  if (status === "rechazado") {
    return (
      <div className="stepper">
        <div className="step done"><div className="dot">1</div><div className="label">Solicitado</div></div>
        <div className="step rejected"><div className="dot">✕</div><div className="label">Rechazado</div></div>
      </div>
    );
  }
  const order = { solicitado: 0, autorizado: 1, liberado: 2, comprobado: 3, parcial: 2 };
  const cur = order[status] ?? 0;
  return (
    <div className="stepper">
      {steps.map((s, i) => {
        const cls = i < cur ? "done" : (i === cur ? "active" : "");
        return (
          <div key={s.key} className={`step ${cls}`}>
            <div className="dot">{i < cur ? "✓" : i + 1}</div>
            <div className="label">{s.label}</div>
            {dates && dates[s.key] && <div className="meta">{window.fmtFecha(dates[s.key])}</div>}
          </div>
        );
      })}
    </div>
  );
}

// Sparkline
function Spark({ values, color = "var(--accent)" }) {
  const w = 80, h = 36;
  const max = Math.max(...values), min = Math.min(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    return `${x},${y}`;
  }).join(" ");
  return (
    <svg className="spark" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <polyline fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" points={pts} />
    </svg>
  );
}

function CompUploader({ onAdd }) {
  const [files, setFiles] = React.useState([]);
  const [drag, setDrag] = React.useState(false);
  const inputRef = React.useRef(null);

  const guessCuenta = (text) => {
    const n = (text || "").toLowerCase();
    let conf = 0.95;
    if (/(aeromexico|volaris|viva|aerobus|vuelo|avi[oó]n|pasaje a[eé]reo|transporte a[eé]reo)/.test(n)) return ["6122900001", conf];
    if (/(caseta|peaje|capufe|autopista|cuota carret)/.test(n)) return ["6122900002", conf];
    if (/(hotel|hospedaje|posada|marriott|fiesta inn|holiday|city express|hilton|sheraton|noche)/.test(n)) return ["6122900003", conf];
    if (/(estacionamiento|parking|parqu[ií]metro|pension auto|valet)/.test(n)) return ["6122900004", conf];
    if (/(restaurante|aliment|comida|desayuno|cena|cafeter[ií]a|caf[eé] |consumo en|men[uú])/.test(n)) return ["6122900005", conf];
    if (/(hertz|sixt|avis|alamo|enterprise|renta de auto|arrendamiento de veh)/.test(n)) return ["6122900006", conf];
    if (/(pemex|gasolina|magna|premium|diesel|combustible|gas natural)/.test(n)) return ["6120800001", conf];
    if (/(tua|tarifa de uso|aeropuerto|asur|aifa|oma|gap aeropuertos)/.test(n)) return ["6122700001", conf];
    return ["6121200001", 0.55]; // No deducibles / manual
  };

  const parseCFDI = (xmlText) => {
    try {
      const doc = new DOMParser().parseFromString(xmlText, "application/xml");
      if (doc.querySelector("parsererror")) return null;
      // Buscar el nodo Comprobante (puede llevar prefijo cfdi:)
      const comp = doc.querySelector("Comprobante") || doc.documentElement;
      const total = parseFloat(comp.getAttribute("Total") || comp.getAttribute("total") || "0");
      const subtotal = parseFloat(comp.getAttribute("SubTotal") || comp.getAttribute("subTotal") || comp.getAttribute("subtotal") || "0");
      const fechaAttr = comp.getAttribute("Fecha") || comp.getAttribute("fecha");
      const fecha = fechaAttr ? new Date(fechaAttr) : new Date();

      const emisorEl = doc.querySelector("Emisor");
      const emisor = emisorEl ? (emisorEl.getAttribute("Nombre") || emisorEl.getAttribute("nombre") || emisorEl.getAttribute("Rfc") || "") : "";
      const rfc = emisorEl ? (emisorEl.getAttribute("Rfc") || emisorEl.getAttribute("rfc") || "") : "";

      // Conceptos: tomar todas las descripciones
      const conceptos = Array.from(doc.querySelectorAll("Concepto"))
        .map(c => c.getAttribute("Descripcion") || c.getAttribute("descripcion") || "")
        .filter(Boolean);
      const conceptoStr = conceptos.join(" · ").slice(0, 120) || "—";
      const claveProdServ = Array.from(doc.querySelectorAll("Concepto"))
        .map(c => c.getAttribute("ClaveProdServ") || c.getAttribute("claveProdServ") || "")
        .filter(Boolean)
        .join(" ");

      // IVA: sumar Traslados con Impuesto = 002
      let iva = 0;
      doc.querySelectorAll("Traslado").forEach(t => {
        const imp = t.getAttribute("Impuesto") || t.getAttribute("impuesto");
        if (imp === "002" || imp === "IVA") iva += parseFloat(t.getAttribute("Importe") || t.getAttribute("importe") || "0") || 0;
      });
      if (!iva && total && subtotal) iva = Math.round((total - subtotal) * 100) / 100;

      // UUID del TimbreFiscalDigital
      const tfd = doc.querySelector("TimbreFiscalDigital");
      let uuid = tfd ? (tfd.getAttribute("UUID") || tfd.getAttribute("uuid")) : "";
      if (uuid) uuid = uuid.toUpperCase().slice(0, 8) + "-" + uuid.toUpperCase().slice(9, 13);

      // Empate: usar emisor + conceptos + claveprodserv + RFC
      const matchText = `${emisor} ${conceptoStr} ${claveProdServ} ${rfc}`;
      const [cuenta, conf] = guessCuenta(matchText);

      return {
        uuid: uuid || "Sin UUID",
        emisor: emisor || rfc || "Emisor desconocido",
        concepto: conceptoStr,
        subtotal: Math.round(subtotal * 100) / 100,
        iva: Math.round(iva * 100) / 100,
        total: Math.round(total * 100) / 100,
        fecha, cuenta, confianza: conf,
      };
    } catch (err) {
      console.error("CFDI parse error", err);
      return null;
    }
  };

  const readAsText = (file) => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsText(file);
  });

  const processFiles = async (fileList) => {
    const arr = Array.from(fileList);
    const xmls = arr.filter(f => f.name.toLowerCase().endsWith(".xml"));
    const pdfs = arr.filter(f => f.name.toLowerCase().endsWith(".pdf"));
    setFiles(prev => [...prev, ...arr.map(f => ({ name: f.name, size: f.size, type: f.name.toLowerCase().endsWith(".xml") ? "XML" : f.name.toLowerCase().endsWith(".pdf") ? "PDF" : "?" }))]);

    const newItems = [];
    for (const f of xmls) {
      const text = await readAsText(f);
      const parsed = parseCFDI(text);
      if (parsed) {
        newItems.push({ id: `C-${Date.now()}-${Math.floor(Math.random()*10000)}`, ...parsed });
      } else {
        // XML inválido o no CFDI: stub manual
        newItems.push({
          id: `C-${Date.now()}-${Math.floor(Math.random()*10000)}`,
          uuid: "XML inválido", emisor: f.name.replace(/\.[^.]+$/, ""),
          concepto: "Captura manual requerida", subtotal: 0, iva: 0, total: 0,
          fecha: new Date(), cuenta: "6121200001", confianza: 0.3,
        });
      }
    }
    if (newItems.length) onAdd(newItems);

    if (xmls.length === 0 && pdfs.length > 0) {
      const stubs = pdfs.map(f => ({
        id: `C-${Date.now()}-${Math.floor(Math.random()*10000)}`,
        uuid: "PDF sin XML", emisor: f.name.replace(/\.[^.]+$/, ""),
        concepto: "Capturar manualmente · adjunta el XML para auto-llenar",
        subtotal: 0, iva: 0, total: 0, fecha: new Date(),
        cuenta: "6121200001", confianza: 0.4,
      }));
      onAdd(stubs);
    }
  };

  const onDrop = (e) => {
    e.preventDefault(); setDrag(false);
    if (e.dataTransfer.files) processFiles(e.dataTransfer.files);
  };

  return (
    <>
      <div
        className={`dropzone ${drag ? "drag" : ""}`}
        onDragOver={e => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={onDrop}
        onClick={() => inputRef.current?.click()}
        style={{cursor:"pointer"}}
      >
        <div className="dropzone-icon"><Icon name="upload" size={20}/></div>
        <div className="dropzone-title">Arrastra XML + PDF de cada factura</div>
        <div className="dropzone-sub">El sistema extrae RFC, fecha, monto e IVA automáticamente · Acepta múltiples archivos</div>
        <div style={{marginTop:14}}>
          <button className="btn" onClick={(e) => { e.stopPropagation(); inputRef.current?.click(); }}>Seleccionar archivos</button>
        </div>
        <input ref={inputRef} type="file" multiple accept=".xml,.pdf,application/xml,application/pdf,text/xml"
          style={{display:"none"}}
          onChange={(e) => { if (e.target.files) processFiles(e.target.files); e.target.value = ""; }}
        />
      </div>
      {files.length > 0 && (
        <div style={{marginTop:14, display:"flex", gap:10, flexWrap:"wrap"}}>
          {files.map((f, i) => (
            <div key={i} className="file-chip" style={{flex:"1 1 240px"}}>
              <div className="icon-box">{f.type}</div>
              <div className="meta">
                <div className="name">{f.name}</div>
                <div className="sz">{(f.size/1024).toFixed(1)} KB · procesado</div>
              </div>
              <Icon name="check" size={14} style={{color:"var(--success)"}}/>
            </div>
          ))}
        </div>
      )}
    </>
  );
}

function NuevaComprobacion({ setPage, userId = "U001" }) {
  // pendientes como estado para que se actualice al enviar
  const [pendientes, setPendientes] = React.useState(() =>
    window.SOLICITUDES.filter(s =>
      s.tipo === "anticipo" && s.usuario === userId &&
      ["autorizado","liberado"].includes(s.status) && s.saldoPendiente > 0

  const [anticipoSel, setAnticipoSel] = React.useState(null);
  const [items, setItems] = React.useState([]);   // vacío — usuario sube sus propias facturas
  const [editId, setEditId] = React.useState(null);
  const [toast, setToast] = React.useState(null);
  const [enviado, setEnviado] = React.useState(false);  // bloquea doble envío

  if (!anticipoSel) {
    return (
      <>
        <div className="page-head">
          <div>
            <h1 className="page-title">Comprobaciones</h1>
            <div className="page-sub">Selecciona el anticipo del que vas a comprobar gastos</div>

            </div>
          </div>
          {pendientes.length === 0 ? (
            <div className="muted" style={{fontSize:12.5, padding:"4px 0"}}>No tienes anticipos pendientes de comprobar.</div>
          ) : (
            <div className="table-wrap" style={{border:"none"}}>
              <table className="t">
                <thead><tr><th>Folio</th><th>Concepto</th><th>Fecha</th><th className="right">Anticipo</th><th className="right">Saldo</th><th>Status</th><th></th></tr></thead>
                <tbody>
                  {pendientes.map(a => (
                    <tr key={a.id} onClick={() => setAnticipoSel(a)}>
                      <td className="id-cell">{a.id}</td>
                      <td>{a.concepto}</td>
                      <td className="muted mono" style={{fontSize:12}}>{window.fmtFecha(a.fecha)}</td>

                      <td className="num"><strong>{window.fmtMXN(a.saldoPendiente)}</strong></td>
                      <td><StatusBadge status={a.status}/></td>
                      <td className="right"><button className="btn sm primary">Comprobar <Icon name="chevR" size={12}/></button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

        <div className="card">
          <div className="card-head">
            <div>
              <h3 className="card-title">¿Sin anticipo previo?</h3>
              <div className="card-sub">Si pagaste de tu bolsa sin pedir anticipo, solicita un reembolso.</div>
            </div>
            <button className="btn" onClick={() => setPage && setPage("reembolsos")}><Icon name="refund" size={13}/> Ir a reembolsos</button>
          </div>
        </div>
      </>
    );
  }
  const updItem = (id, k, v) => setItems(items.map(i => i.id === id ? { ...i, [k]: k === "total" || k === "subtotal" || k === "iva" ? parseFloat(v) || 0 : v } : i));
  const delItem = (id) => setItems(items.filter(i => i.id !== id));
  const total = items.reduce((a,i) => a + i.total, 0);
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };
  const handleEnviar = () => {
    if (enviado) return;                              // bloqueo de doble envío
    if (items.length === 0) {
      showToast("⚠ Agrega al menos un comprobante antes de enviar");
      return;
    }
    const totalComp = items.reduce((a, i) => a + (i.total || 0), 0);
    const id = "CMP-" + new Date().getFullYear() + "-" + String(Date.now()).slice(-4);

    // Registrar la comprobación en SOLICITUDES
    const nueva = {
      id,
      tipo: "comprobacion",
      concepto: "Comprobación " + anticipoSel.id,
      usuario: userId,
      monto: totalComp,
      fecha: new Date(),
      status: "solicitado",
      anticipoRef: anticipoSel.id,
      comprobantes: items.length,
      cfdi: items,
      saldoPendiente: 0,
    };
    window.SOLICITUDES.unshift(nueva);

    // Marcar el anticipo como comprobado parcial si sobra saldo
    const antic = window.SOLICITUDES.find(s => s.id === anticipoSel.id);
    if (antic) {
      const nuevoSaldo = Math.max(0, (antic.saldoPendiente || 0) - totalComp);
      antic.saldoPendiente = Math.round(nuevoSaldo * 100) / 100;
      antic.status = nuevoSaldo <= 0 ? "comprobado" : "parcial";
      antic.comprobantes = (antic.comprobantes || 0) + items.length;
    }

    // Actualizar la lista de pendientes para que desaparezca el anticipo comprobado
    setPendientes(prev =>
      prev.filter(p => p.id !== anticipoSel.id || (antic && antic.saldoPendiente > 0))
    );

    setEnviado(true);
    showToast("✓ Comprobación " + id + " enviada a autorización");
    setTimeout(() => setPage && setPage("dash"), 1400);
  };
  const handleBorrador = () => {
    const id = `BOR-${Date.now().toString().slice(-6)}`;
    window.BORRADORES = window.BORRADORES || [];
    window.BORRADORES.push({ id, concepto: "Comprobación en captura", fecha: new Date(), tipo: "comprobacion", items });
    showToast(`✓ Borrador ${id} guardado · velo en "Comprobaciones"`);
  };
  const handleCancelar = () => setPage && setPage("dash");

  return (
    <>
      {toast && (
        <div style={{position:"fixed", bottom:24, right:24, background:"var(--success-soft)", border:"1px solid oklch(from var(--success) l c h / 0.4)", color:"var(--success)", padding:"12px 18px", borderRadius:"var(--r-lg)", zIndex:100, fontWeight:500, fontSize:13}}>

function Reembolsos({ userId }) {

    concepto: "", fecha: "", destino: "", notas: "",
  });
  const [desglose, setDesglose] = React.useState([
    { id: 1, nombre: "", monto: 0, cuenta: "6122900005" },
  ]);
  const [archivos, setArchivos] = React.useState([]);
  const [errores, setErrores] = React.useState({});

  const showToast = (msg, tipo="ok") => { setToast({msg,tipo}); setTimeout(()=>setToast(null),3000); };

  const updDesg = (id,k,v) => setDesglose(desglose.map(d => d.id===id ? {...d,[k]:v} : d));
  const addDesg = () => setDesglose([...desglose, {id:Date.now(),nombre:"",monto:0,cuenta:"6122900005"}]);
  const delDesg = id => setDesglose(desglose.filter(d => d.id!==id));
  const totalDesg = desglose.reduce((a,d)=>a+(parseFloat(d.monto)||0),0);

  const validar = () => {
    const e = {};
    if (!form.concepto.trim()) e.concepto = "Requerido";
    if (!form.fecha.trim()) e.fecha = "Requerido";
    if (desglose.every(d=>!(parseFloat(d.monto)>0))) e.desglose = "Agrega al menos un concepto con monto";
    if (archivos.length===0) e.archivos = "Adjunta al menos un comprobante (XML o PDF)";
    setErrores(e);
    return Object.keys(e).length === 0;
  };

  const enviar = () => {
    if (!validar()) return;
    const id = "REE-" + Date.now().toString().slice(-6);
    const montoFinal = totalDesg > 0 ? totalDesg : archivos.reduce((a,c)=>a+(c.total||0),0);
    const nuevo = {
      id, tipo:"reembolso", concepto: form.concepto.trim(),
      usuario: userId, monto: montoFinal,
      fecha: new Date(), status:"solicitado", comprobantes: archivos.length,
      notas: form.notas,
      cfdi: archivos,
    };
    window.SOLICITUDES.unshift(nuevo);
    setSolicitudes(prev => [nuevo, ...prev]);
    setMostrarForm(false);
    setForm({concepto:"",fecha:"",destino:"",notas:""});
    setDesglose([{id:1,nombre:"",monto:0,cuenta:"6122900005"}]);
    setArchivos([]);
    showToast(`✓ Reembolso ${id} enviado a aprobación`);
  };

  const exportar = () => {
    const rows = [["Folio","Concepto","Fecha","Monto","Status","Comprobantes"]];
    solicitudesFiltradas.forEach(r =>
      rows.push([r.id, r.concepto, window.fmtFecha(r.fecha), r.monto, r.status, r.comprobantes + " archivos"])
    );
    const csv = rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
    const a = document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`reembolsos_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  };

  const enFlujo = solicitudes.filter(s=>["solicitado","autorizado"].includes(s.status));
  const liberados = solicitudes.filter(s=>s.status==="liberado");

  const solicitudesFiltradas = solicitudes
    .filter(s => filtro==="todas" || s.status===filtro)
    .filter(s => {
      if (!busqueda.trim()) return true;
      const q = busqueda.toLowerCase();
      return s.id.toLowerCase().includes(q) || s.concepto.toLowerCase().includes(q);
    });

    <>
      {toast && (
        <div style={{position:"fixed",bottom:24,right:24,zIndex:300,padding:"12px 18px",
          borderRadius:"var(--r-lg)",fontWeight:500,fontSize:13,
          background:"var(--success-soft)",color:"var(--success)",
          border:"1px solid var(--success)",boxShadow:"0 4px 20px rgba(0,0,0,.15)"}}>
          {toast.msg}

      {/* Formulario nuevo reembolso */}
      {mostrarForm && (
        <div className="card" style={{marginBottom:18,border:"1px solid var(--accent)",borderRadius:"var(--r-lg)"}}>

          <div className="form-grid cols-2" style={{marginBottom:14}}>

  const [rechazoModal, setRechazoModal] = React.useState(null);
  const [detalleRapido, setDetalleRapido] = React.useState(null);

  const showToast = (msg, tipo = "ok") => {
    setToast({ msg, tipo });
    setTimeout(() => setToast(null), 3200);
  };

  // ── Aprobar ────────────────────────────────────────────────────────────
  const aprobar = (id, e) => {
    e.stopPropagation();
    const s = window.SOLICITUDES.find(x => x.id === id);
    if (s) s.status = "autorizado";
    setItems(prev => prev.filter(x => x.id !== id));
    showToast(`✓ ${id} autorizado y enviado a Tesorería`);
  };

  // ── Rechazo ────────────────────────────────────────────────────────────
  const abrirRechazo = (id, e) => {
    e.stopPropagation();
    setRechazoModal({ id, motivo: "" });
  };
  const confirmarRechazo = () => {
    if (!rechazoModal.motivo.trim()) return;
    const s = window.SOLICITUDES.find(x => x.id === rechazoModal.id);
    if (s) { s.status = "rechazado"; s.motivoRechazo = rechazoModal.motivo.trim(); }
    setItems(prev => prev.filter(x => x.id !== rechazoModal.id));
    showToast(`Solicitud ${rechazoModal.id} rechazada`, "warn");
    setRechazoModal(null);
  };

  // ── Exportar CSV ───────────────────────────────────────────────────────
  const exportar = () => {
    const rows = [["Folio","Tipo","Solicitante","Centro","Concepto","Fecha","Monto","Status"]];
    items.forEach(s => {
      const u = window.findUser(s.usuario);
      rows.push([s.id, s.tipo, u.nombre, u.centro, s.concepto,
        window.fmtFecha(s.fecha), s.monto, s.status]);
    });
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join('\n');
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = `pendientes_gerente_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  // ── Filtrado ───────────────────────────────────────────────────────────
  const counts = {
    anticipo:     items.filter(s => s.tipo === "anticipo").length,
    comprobacion: items.filter(s => s.tipo === "comprobacion").length,
    reembolso:    items.filter(s => s.tipo === "reembolso").length,
  };
  const filtradas = items
    .filter(s => filtro === "todas" || s.tipo === filtro)
    .filter(s => {
      if (!busqueda.trim()) return true;
      const q = busqueda.toLowerCase();
      const u = window.findUser(s.usuario);
      return s.id.toLowerCase().includes(q) || s.concepto.toLowerCase().includes(q) || u.nombre.toLowerCase().includes(q);
    });

  return (
    <>
      {/* Toast */}
      {toast && (
        <div style={{position:"fixed",bottom:24,right:24,zIndex:300,padding:"12px 18px",
          borderRadius:"var(--r-lg)",fontWeight:500,fontSize:13,
          background: toast.tipo==="warn" ? "var(--danger-soft,#fef2f2)" : "var(--success-soft)",
          color: toast.tipo==="warn" ? "var(--danger)" : "var(--success)",
          border:`1px solid ${toast.tipo==="warn" ? "var(--danger)" : "var(--success)"}`,
          boxShadow:"0 4px 20px rgba(0,0,0,.15)"}}>
          {toast.msg}
        </div>
      )}

      {/* Modal rechazo */}
      {rechazoModal && (
        <div className="modal-overlay" onClick={() => setRechazoModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{maxWidth:480}}>
            <div className="modal-head">
              <div>
                <h2 className="modal-title">Rechazar solicitud</h2>
                <div className="card-sub" style={{marginTop:2}}>{rechazoModal.id}</div>
              </div>
              <div className="icon-btn" onClick={() => setRechazoModal(null)}><Icon name="x" size={14}/></div>
            </div>
            <div className="modal-body">
              <div style={{marginBottom:14,padding:"10px 14px",background:"var(--danger-soft,#fef2f2)",
                borderRadius:"var(--r-md)",fontSize:13,color:"var(--danger)",
                border:"1px solid var(--danger)"}}>
                El colaborador verá este motivo y podrá corregir y reenviar su solicitud.
              </div>
              <div className="field">
                <label>Motivo del rechazo *</label>
                <textarea className="input" style={{minHeight:90,resize:"vertical"}}
                  placeholder="Ej: Falta el XML de la factura de gasolina. Favor adjuntarlo y reenviar."
                  value={rechazoModal.motivo}
                  onChange={e => setRechazoModal({...rechazoModal, motivo: e.target.value})}
                />
                {!rechazoModal.motivo.trim() && (
                  <div style={{fontSize:12,color:"var(--danger)",marginTop:4}}>
                    El motivo es obligatorio para rechazar
                  </div>
                )}
              </div>
            </div>
            <div style={{padding:"14px 22px",borderTop:"1px solid var(--border)",
              display:"flex",justifyContent:"flex-end",gap:8}}>
              <button className="btn ghost" onClick={() => setRechazoModal(null)}>Cancelar</button>
              <button className="btn danger"
                style={{opacity: rechazoModal.motivo.trim() ? 1 : 0.4,
                        pointerEvents: rechazoModal.motivo.trim() ? "auto" : "none"}}
                onClick={confirmarRechazo}>
                <Icon name="x" size={13}/> Confirmar rechazo
              </button>
            </div>
          </div>
        </div>
      )}

      <div className="page-head">
        <div>
          <h1 className="page-title">Por aprobar</h1>
          <div className="page-sub">Solicitudes de tu equipo esperando autorización</div>
        </div>
        <div className="row">
          <button className="btn" onClick={exportar}><Icon name="download" size={13}/> Exportar CSV</button>
        </div>
      </div>

      <div className="kpi-grid">
        <div className="kpi">
          <div className="kpi-label">Pendientes</div>
          <div className="kpi-value">{items.length}</div>
          <div className={`kpi-delta ${items.filter(s=>Math.floor((window.HOY-s.fecha)/86400000)>2).length>0?"down":"up"}`}>
            {items.filter(s=>Math.floor((window.HOY-s.fecha)/86400000)>2).length} con +48 h
          </div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Monto pendiente</div>
          <div className="kpi-value">{window.fmtMXN(items.reduce((a,s)=>a+s.monto,0))}</div>
          <div className="kpi-delta neutral">total a evaluar</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Anticipos</div>
          <div className="kpi-value">{counts.anticipo}</div>
          <div className="kpi-delta neutral">{counts.comprobacion} comprobaciones · {counts.reembolso} reembolsos</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Tiempo prom. respuesta</div>
          <div className="kpi-value">6.4 h</div>
          <div className="kpi-delta up">SLA: 24 h</div>
        </div>
      </div>

      {/* Barra de filtros + búsqueda */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <div className="filterbar" style={{margin:0,flex:"1 1 auto"}}>
          {[
            {k:"todas",    label:"Todas"},
            {k:"anticipo", label:"Anticipos"},
            {k:"comprobacion",label:"Comprobaciones"},
            {k:"reembolso",label:"Reembolsos"},
          ].map(f => (
            <div key={f.k}
              className={`chip ${filtro===f.k?"active":""}`}
              onClick={() => setFiltro(f.k)}>
              {f.label}
              <span className="count">{f.k==="todas" ? items.length : counts[f.k]}</span>
            </div>

        </div>
        <div className="search" style={{width:220}}>
          <Icon name="search" size={14}/>
          <input placeholder="Buscar folio, nombre…"
            value={busqueda}
            onChange={e => setBusqueda(e.target.value)}/>
        </div>

      {filtradas.length === 0 ? (
        <div className="card">
          <div className="empty">
            <div className="empty-ic"><Icon name="check" size={20}/></div>

              {busqueda
                ? `No hay solicitudes que coincidan con "${busqueda}"`

                <th>Solicitante</th>
                <th>Concepto</th>
