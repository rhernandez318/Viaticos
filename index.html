function TesoreriaBandeja({ openDetail }) {
  const [items, setItems] = React.useState(() => window.SOLICITUDES.filter(s => s.status === "autorizado"));
  const [selected, setSelected] = React.useState(() => new Set(window.SOLICITUDES.filter(s => s.status === "autorizado").map(s => s.id)));
  const [toast, setToast] = React.useState(null);

  const liberar = (ids) => {
    const idsArr = Array.isArray(ids) ? ids : [ids];
    idsArr.forEach(id => {
      const s = window.SOLICITUDES.find(x => x.id === id);
      if (s) s.status = "liberado";
    });
    setItems(items.filter(i => !idsArr.includes(i.id)));
    const newSel = new Set(selected);
    idsArr.forEach(id => newSel.delete(id));
    setSelected(newSel);
    const total = idsArr.reduce((a, id) => {
      const s = window.SOLICITUDES.find(x => x.id === id);
      return a + (s ? s.monto : 0);
    }, 0);
    setToast(`✓ ${idsArr.length} solicitud${idsArr.length > 1 ? "es" : ""} liberada${idsArr.length > 1 ? "s" : ""} · ${window.fmtMXN(total)} dispersados`);
    setTimeout(() => setToast(null), 3500);
  };

  const toggle = (id) => {
    const ns = new Set(selected);
    if (ns.has(id)) ns.delete(id); else ns.add(id);
    setSelected(ns);
  };

  const toggleAll = () => {
    if (selected.size === items.length) setSelected(new Set());
    else setSelected(new Set(items.map(i => i.id)));
  };

  const [filtroTeso, setFiltroTeso] = React.useState("todas");
  const [busquedaTeso, setBusquedaTeso] = React.useState("");

  const exportarSPEI = () => {
    const sel = items.filter(i => selected.has(i.id));
    const rows = [["Folio","Beneficiario","CLABE","Banco","Monto","Concepto"]];
    sel.forEach(s => {
      const u = window.findUser(s.usuario);
      rows.push([s.id, u.nombre, "••••4392", "BBVA", s.monto, s.concepto]);
    });
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join('\n');
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = `layout_spei_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  const countsTeso = {
    anticipo:     items.filter(s=>s.tipo==="anticipo").length,
    comprobacion: items.filter(s=>s.tipo==="comprobacion").length,
    reembolso:    items.filter(s=>s.tipo==="reembolso").length,
  };
  const itemsFiltrados = items
    .filter(s => filtroTeso==="todas" || s.tipo===filtroTeso)
    .filter(s => {
      if (!busquedaTeso.trim()) return true;
      const q = busquedaTeso.toLowerCase();
      const u = window.findUser(s.usuario);
      return s.id.toLowerCase().includes(q) || u.nombre.toLowerCase().includes(q) || s.concepto.toLowerCase().includes(q);
    });

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Por liberar</h1>
          <div className="page-sub">Solicitudes autorizadas listas para dispersión</div>
        </div>
        <div className="row">
          <button className="btn" onClick={exportarSPEI} disabled={selected.size===0}>
            <Icon name="download" size={13}/> Layout SPEI ({selected.size})
          </button>
          <button className="btn primary" disabled={selected.size === 0} onClick={() => liberar([...selected])}>
            <Icon name="cash" size={13}/> Liberar lote ({selected.size})
          </button>
        </div>
      </div>

      {toast && (
        <div style={{position:"fixed", bottom:24, right:24, background:"var(--success-soft)", border:"1px solid oklch(from var(--success) l c h / 0.4)", color:"var(--success)", padding:"12px 18px", borderRadius:"var(--r-lg)", zIndex:100, fontWeight:500, fontSize:13}}>
          {toast}
        </div>
      )}

      <div className="kpi-grid">
        <div className="kpi"><div className="kpi-label">Por liberar</div><div className="kpi-value">{items.length}</div><div className="kpi-delta neutral">solicitudes</div></div>
        <div className="kpi"><div className="kpi-label">Monto total</div><div className="kpi-value">{window.fmtMXN(items.reduce((a,s)=>a+s.monto,0))}</div><div className="kpi-delta up">listo para SPEI</div></div>
        <div className="kpi"><div className="kpi-label">Liberado hoy</div><div className="kpi-value">{window.fmtMXN(48230)}</div><div className="kpi-delta up">8 transferencias</div></div>
        <div className="kpi"><div className="kpi-label">Saldos abiertos</div><div className="kpi-value">{window.fmtMXN(76200)}</div><div className="kpi-delta down">deuda viva</div></div>
      </div>

      {/* Filter bar */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <div className="filterbar" style={{margin:0,flex:"1 1 auto"}}>
          {[
            {k:"todas",label:"Todas"},
            {k:"anticipo",label:"Anticipos"},
            {k:"comprobacion",label:"Comprobaciones"},
            {k:"reembolso",label:"Reembolsos"},
          ].map(f=>(
            <div key={f.k} className={`chip ${filtroTeso===f.k?"active":""}`} onClick={()=>setFiltroTeso(f.k)}>
              {f.label} <span className="count">{f.k==="todas"?items.length:countsTeso[f.k]}</span>
            </div>
          ))}
        </div>
        <div className="search" style={{width:220}}>
          <Icon name="search" size={14}/>
          <input placeholder="Buscar folio, nombre…" value={busquedaTeso} onChange={e=>setBusquedaTeso(e.target.value)}/>
        </div>
      </div>

      {items.length === 0 ? (
        <div className="card"><div className="empty"><div className="empty-ic"><Icon name="check" size={20}/></div><div style={{fontWeight:600, fontSize:14, color:"var(--text)"}}>Todo liberado</div><div style={{marginTop:4}}>No hay solicitudes pendientes de dispersión</div></div></div>
      ) : itemsFiltrados.length === 0 ? (
        <div className="card"><div className="empty"><div className="empty-ic"><Icon name="search" size={20}/></div><div style={{fontWeight:600,fontSize:14,color:"var(--text)"}}>Sin resultados</div><div style={{marginTop:4}}>Ajusta los filtros de búsqueda</div></div></div>
      ) : (
        <div className="card" style={{padding:0}}>
          <table className="t">
            <thead>
              <tr>
                <th style={{width:30}}><input type="checkbox" checked={selected.size === items.length} onChange={toggleAll}/></th>
                <th></th><th>Folio</th><th>Beneficiario</th><th>Centro</th><th>Concepto</th><th className="right">Monto</th><th>CLABE</th><th></th>
              </tr>
            </thead>
            <tbody>
              {itemsFiltrados.map(s => {
                const u = window.findUser(s.usuario);
                const c = window.findCentro(u.centro);
                return (
                  <tr key={s.id} onClick={() => openDetail(s.id)}>
                    <td onClick={e => e.stopPropagation()}><input type="checkbox" checked={selected.has(s.id)} onChange={() => toggle(s.id)}/></td>
                    <td><TipoBadge tipo={s.tipo}/></td>
                    <td className="id-cell">{s.id}</td>
                    <td>{u.nombre}</td>
                    <td className="mono muted" style={{fontSize:12}}>{c ? c.id : u.centro}</td>
                    <td className="muted">{s.concepto}</td>
                    <td className="num">{window.fmtMXN(s.monto)}</td>
                    <td className="mono muted" style={{fontSize:11}}>•••• 4392</td>
                    <td className="right" onClick={e=>e.stopPropagation()}>
                      <button className="btn sm primary" onClick={() => liberar(s.id)}><Icon name="cash" size={12}/> Liberar</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </>
  );
}

function EditModal({ title, fields, onClose, onSave }) {
  const [vals, setVals] = React.useState(() => Object.fromEntries(fields.map(f => [f.key, f.value ?? ""])));
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:560}}>
        <div className="modal-head">
          <h2 className="modal-title">{title}</h2>
          <div className="icon-btn" onClick={onClose}><Icon name="x" size={14}/></div>
        </div>
        <div className="modal-body">
          <div className="form-grid cols-2">
            {fields.map(f => (
              <div className="field" key={f.key} style={f.full ? {gridColumn:"1 / -1"} : null}>
                <label>{f.label}</label>
                {f.type === "select" ? (
                  <select className="select" value={vals[f.key]} onChange={e => setVals({...vals, [f.key]: e.target.value})}>
                    {f.options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                  </select>
                ) : (
                  <input className="input" value={vals[f.key]} onChange={e => setVals({...vals, [f.key]: e.target.value})}/>
                )}
                {f.hint && <div className="hint">{f.hint}</div>}
              </div>
            ))}
          </div>
        </div>
        <div style={{padding:"14px 22px", borderTop:"1px solid var(--border)", display:"flex", justifyContent:"flex-end", gap:8}}>
          <button className="btn ghost" onClick={onClose}>Cancelar</button>
          <button className="btn primary" onClick={() => { onSave(vals); onClose(); }}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

function AdminUsuarios() {
  const [users, setUsers]   = React.useState(window.USUARIOS);
  const [editing, setEditing] = React.useState(null);
  const [filtro, setFiltro]   = React.useState("todos");
  const [busqueda, setBusqueda] = React.useState("");

  const openEdit = (u) => setEditing(u || {
    id:"", nombre:"", correo:"", rol:"usuario",
    centro: window.CENTROS[0].id, gerente: null, iniciales:""
  });

  const save = (vals) => {
    const iniciales = vals.nombre.split(" ").map(p=>p[0]).slice(0,2).join("").toUpperCase();
    const exists = users.find(u => u.id === editing.id);
    let updated;
    if (exists) {
      updated = users.map(u => u.id === editing.id ? {...u,...vals,iniciales} : u);
    } else {
      updated = [...users, {...editing,...vals, id: vals.id||`U${Date.now()}`, iniciales}];
    }
    setUsers(updated);
    window.USUARIOS = updated;
    setEditing(null);
  };

  const exportar = (lista) => {
    const rows = [["ID","Nombre","Correo","Rol","Centro","Reporta a"]];
    lista.forEach(u => {
      const g = u.gerente ? window.findUser(u.gerente) : null;
      rows.push([u.id, u.nombre, u.correo, u.rol, u.centro, g ? g.nombre : "—"]);
    });
    const csv = rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = `usuarios_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  const conteos = {
    todos:     users.length,
    usuario:   users.filter(u=>u.rol==="usuario").length,
    gerente:   users.filter(u=>u.rol==="gerente").length,
    tesoreria: users.filter(u=>u.rol==="tesoreria").length,
    admin:     users.filter(u=>u.rol==="admin").length,
  };

  const filtrados = users
    .filter(u => filtro==="todos" || u.rol===filtro)
    .filter(u => {
      if (!busqueda.trim()) return true;
      const q = busqueda.toLowerCase();
      return u.nombre.toLowerCase().includes(q) ||
             u.correo.toLowerCase().includes(q) ||
             u.id.toLowerCase().includes(q);
    });

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Usuarios</h1>
          <div className="page-sub">Catálogo de usuarios y permisos</div>
        </div>
        <div className="row">
          <button className="btn" onClick={() => exportar(filtrados)}>
            <Icon name="download" size={13}/> Exportar

function Reportes() {
  const AÑOS = ["2026","2025","2024"];
  const [anio,    setAnio]    = React.useState("2026");
  const [centro,  setCentro]  = React.useState("todos");
  const [tabRep,  setTabRep]  = React.useState("aging");

  // Filtrar solicitudes por año y centro
  const solicsFiltradas = React.useMemo(() => {
    return window.SOLICITUDES.filter(s => {
      const u = window.findUser(s.usuario);
      if (!u) return false;
      const matchAnio   = String(s.fecha.getFullYear()) === anio;
      const matchCentro = centro === "todos" || u.centro === centro;
      return matchAnio && matchCentro;
    });
  }, [anio, centro]);

  // Saldos abiertos (anticipos sin comprobar)
  const ahoraSaldos = solicsFiltradas.filter(s => s.tipo==="anticipo" && s.saldoPendiente>0);

  // Aging buckets
  const buckets = {"0-15":[],"16-30":[],"31-60":[],"60+":[]};
  ahoraSaldos.forEach(s => {
    const d = Math.floor((window.HOY - s.fecha)/86400000);
    if (d<=15) buckets["0-15"].push(s);
    else if (d<=30) buckets["16-30"].push(s);
    else if (d<=60) buckets["31-60"].push(s);
    else buckets["60+"].push(s);
  });
  const sumB = k => buckets[k].reduce((a,s)=>a+s.saldoPendiente,0);

  // Top deudores
  const porUser = {};
  ahoraSaldos.forEach(s => { porUser[s.usuario]=(porUser[s.usuario]||0)+s.saldoPendiente; });
  const topDeudores = Object.entries(porUser)
    .map(([uid,m])=>({u:window.findUser(uid),monto:m}))
    .filter(d=>d.u)
    .sort((a,b)=>b.monto-a.monto);

  // Por departamento
  const porDepto = {};
  solicsFiltradas.forEach(s => {
    const u = window.findUser(s.usuario);
    const c = u ? window.findCentro(u.centro) : null;
    if (c) porDepto[c.depto]=(porDepto[c.depto]||0)+s.monto;
  });
  const deptoMax = Math.max(...Object.values(porDepto),1);

  // Por cuenta contable
  const porCuenta = {};
  solicsFiltradas.forEach(s => {
    // mock desglose: distribute monto across tipos as approximation
    const cuenta = s.tipo==="anticipo" ? "6122900001"
      : s.tipo==="reembolso" ? "6120800001" : "6122900005";
    porCuenta[cuenta]=(porCuenta[cuenta]||0)+s.monto;
  });

  // Exportar CSV según pestaña activa
  const exportar = () => {
    let rows, name;
    if (tabRep==="aging") {
      rows=[["Folio","Concepto","Usuario","Centro","Saldo","Días"]];
      ahoraSaldos.forEach(s=>{
        const u=window.findUser(s.usuario);
        const dias=Math.floor((window.HOY-s.fecha)/86400000);
        rows.push([s.id,s.concepto,u.nombre,u.centro,s.saldoPendiente,dias]);
      });
      name="reporte_aging";
    } else if (tabRep==="deudores") {
      rows=[["Usuario","Centro","Saldo pendiente"]];
      topDeudores.forEach(d=>rows.push([d.u.nombre,d.u.centro,d.monto]));
      name="reporte_deudores";
    } else {
      rows=[["Departamento","Gasto total"]];
      Object.entries(porDepto).sort((a,b)=>b[1]-a[1]).forEach(([dep,m])=>rows.push([dep,m]));
      name="reporte_departamentos";
    }
    const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`${name}_${anio}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  const totalSaldos   = ahoraSaldos.reduce((a,s)=>a+s.saldoPendiente,0);
  const totalGasto    = solicsFiltradas.reduce((a,s)=>a+s.monto,0);
  const totalLiberado = solicsFiltradas.filter(s=>s.status==="liberado").reduce((a,s)=>a+s.monto,0);

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Reportes</h1>
          <div className="page-sub">Antigüedad de saldos, deudores y gasto por unidad</div>
        </div>
        <div className="row">
          <select className="select" value={anio} onChange={e=>setAnio(e.target.value)}>
            {AÑOS.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
          <select className="select" value={centro} onChange={e=>setCentro(e.target.value)}>
            <option value="todos">Todos los centros</option>
            {window.CENTROS.map(c=><option key={c.id} value={c.id}>{c.id} · {c.nombre}</option>)}
          </select>
          <button className="btn" onClick={exportar}>
            <Icon name="download" size={13}/> Exportar CSV
          </button>
        </div>
      </div>

      <div className="kpi-grid">
        <div className="kpi">
          <div className="kpi-label">Saldos abiertos</div>
          <div className="kpi-value">{window.fmtMXN(totalSaldos)}</div>
          <div className="kpi-delta down">{ahoraSaldos.length} anticipos sin comprobar</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Gasto total {anio}</div>
          <div className="kpi-value">{window.fmtMXN(totalGasto)}</div>
          <div className="kpi-delta neutral">{solicsFiltradas.length} solicitudes</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Liberado {anio}</div>
          <div className="kpi-value">{window.fmtMXN(totalLiberado)}</div>
          <div className="kpi-delta up">fondos dispersados</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Comprobado a tiempo</div>
          <div className="kpi-value">73%</div>
          <div className="kpi-delta up">objetivo 85%</div>
        </div>
      </div>

      {/* Tabs de sección */}
      <div style={{display:"flex",gap:0,borderBottom:"1px solid var(--border)",marginBottom:16}}>
        {[
          {k:"aging",    label:"Antigüedad de saldos"},
          {k:"deudores", label:"Top deudores"},
          {k:"depto",    label:"Por departamento"},
          {k:"mensual",  label:"Gasto mensual"},
        ].map(t=>(
          <div key={t.k}
            onClick={()=>setTabRep(t.k)}
            style={{padding:"8px 18px",cursor:"pointer",fontSize:13,fontWeight:500,
              borderBottom: tabRep===t.k ? "2px solid var(--accent)" : "2px solid transparent",
              color: tabRep===t.k ? "var(--text)" : "var(--text-3)",
              transition:"all .15s"}}>
            {t.label}
          </div>
        ))}
      </div>

      {/* Antigüedad */}
      {tabRep==="aging" && (
        <>
          <div className="card" style={{marginBottom:14}}>
            <div className="card-head">
              <h3 className="card-title">Antigüedad de saldos</h3>
              <div className="card-sub">Anticipos sin comprobar · {anio}{centro!=="todos"?` · ${centro}`:""}</div>
            </div>
            <div className="aging-grid">
              {[
                {k:"0-15",  label:"0–15 días",  cls:""},
                {k:"16-30", label:"16–30 días", cls:""},
                {k:"31-60", label:"31–60 días", cls:"warn"},
                {k:"60+",   label:"60+ días",   cls:"danger"},
              ].map(({k,label,cls})=>{
                const pct = totalSaldos>0 ? Math.round(sumB(k)/totalSaldos*100) : 0;
                return (
                  <div key={k} className={`aging ${cls}`}>
                    <div className="lbl">{label}</div>
                    <div className="v">{window.fmtMXN(sumB(k))}</div>
                    <div className="c">{buckets[k].length} anticipos</div>
                    <div className="bar" style={{width:`${pct}%`}}></div>
                  </div>
                );
              })}
            </div>
          </div>
          <div className="card" style={{padding:0}}>
            <table className="t">
              <thead>
                <tr><th>Folio</th><th>Concepto</th><th>Usuario</th><th className="right">Saldo</th><th>Días</th></tr>
              </thead>
              <tbody>
                {ahoraSaldos.length===0 ? (
                  <tr><td colSpan={5} style={{textAlign:"center",padding:"24px",color:"var(--text-3)"}}>Sin saldos abiertos para este filtro</td></tr>
                ) : ahoraSaldos.sort((a,b)=>a.fecha-b.fecha).map(s=>{
                  const u=window.findUser(s.usuario);
                  const dias=Math.floor((window.HOY-s.fecha)/86400000);
                  return (
                    <tr key={s.id}>
                      <td className="id-cell">{s.id}</td>
                      <td>{s.concepto}</td>
                      <td><div className="row"><div className="avatar sm">{u.iniciales}</div><span style={{fontSize:13}}>{u.nombre}</span></div></td>
                      <td className="num">{window.fmtMXN(s.saldoPendiente)}</td>
                      <td><span className={`badge ${dias>60?"rechazado":dias>30?"autorizado":"solicitado"}`}><span className="dot"></span>{dias}d</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>
      )}

      {/* Top deudores */}
      {tabRep==="deudores" && (
        <div className="card">
          <div className="card-head">
            <h3 className="card-title">Top deudores</h3>
            <div className="card-sub">Saldo pendiente por usuario · {anio}</div>
          </div>
          <div className="table-wrap" style={{border:"none"}}>
            <table className="t">
              <thead><tr><th>Usuario</th><th>Centro</th><th className="right">Saldo</th><th>Antigüedad</th></tr></thead>
              <tbody>
                {topDeudores.length===0 ? (
                  <tr><td colSpan={4} style={{textAlign:"center",padding:"24px",color:"var(--text-3)"}}>Sin deudores para este filtro</td></tr>
                ) : topDeudores.map(d=>{
                  const c=window.findCentro(d.u.centro);
                  const masVieja=ahoraSaldos.filter(s=>s.usuario===d.u.id).reduce((mn,s)=>Math.min(mn,s.fecha.getTime()),Infinity);
                  const dias=Math.floor((window.HOY-masVieja)/86400000);
                  return (
                    <tr key={d.u.id}>
                      <td><div className="row"><div className="avatar sm">{d.u.iniciales}</div><div style={{fontSize:13}}>{d.u.nombre}</div></div></td>
                      <td className="muted mono" style={{fontSize:12}}>{c?c.id:d.u.centro}</td>
                      <td className="num">{window.fmtMXN(d.monto)}</td>
                      <td><span className={`badge ${dias>60?"rechazado":dias>30?"autorizado":"solicitado"}`}><span className="dot"></span>{dias}d</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Por departamento */}
      {tabRep==="depto" && (
        <div className="card">
          <div className="card-head">
            <h3 className="card-title">Gasto por departamento</h3>
            <div className="card-sub">YTD {anio}{centro!=="todos"?` · ${centro}`:""}</div>
          </div>
          {Object.entries(porDepto).length===0 ? (
            <div className="muted" style={{padding:"16px 0",fontSize:12.5}}>Sin datos para este filtro</div>
          ) : Object.entries(porDepto).sort((a,b)=>b[1]-a[1]).map(([dep,m])=>(
            <div key={dep} style={{marginBottom:14}}>
              <div className="spread" style={{marginBottom:6}}>
                <span style={{fontSize:13}}>{dep}</span>
                <strong className="mono">{window.fmtMXN(m)}</strong>
              </div>
              <div style={{height:6,background:"var(--surface-3)",borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${(m/deptoMax)*100}%`,background:"var(--accent)",borderRadius:3}}></div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Gasto mensual */}
      {tabRep==="mensual" && (
        <div className="card">
          <div className="card-head">
            <h3 className="card-title">Gasto mensual</h3>
            <div className="card-sub">Últimos 6 meses · {anio}</div>
          </div>
          <div className="chart-bars">
            {[68,52,74,61,89,72].map((v,i)=>(
              <div key={i} className="chart-bar" style={{height:`${v}%`}}>
                <span className="v">{window.fmtMXN(v*1000)}</span>
              </div>
            ))}
          </div>
          <div className="chart-axis"><span>Dic</span><span>Ene</span><span>Feb</span><span>Mar</span><span>Abr</span><span>May</span></div>
        </div>
      )}
    </>
  );
}

function DetalleModal({ id, onClose }) {
  const s = window.SOLICITUDES.find(x => x.id === id);
  if (!s) return null;
  const u = window.findUser(s.usuario);
  const c = window.findCentro(u.centro);

  const dates = {
    solicitado: s.fecha,
    autorizado: ["autorizado","liberado","comprobado","parcial"].includes(s.status) ? new Date(s.fecha.getTime() + 86400000) : null,
    liberado:   ["liberado","comprobado","parcial"].includes(s.status) ? new Date(s.fecha.getTime() + 86400000*2) : null,
    comprobado: s.status === "comprobado" ? new Date(s.fecha.getTime() + 86400000*5) : null,
  };

  // Unificar fuentes de desglose: CFDI > items > desglose
  const lineas = s.cfdi && s.cfdi.length > 0
    ? s.cfdi.map(cf => ({
        cuenta: cf.cuenta,
        desc:   cf.concepto || cf.emisor || "—",
        monto:  cf.total || 0,
        uuid:   cf.uuid || cf.uuidFull || null,
        emisor: cf.emisor || null,
        iva:    cf.iva || 0,
        subtotal: cf.subtotal || 0,
        isCFDI: true,
      }))
    : (s.items || s.desglose || []).map(it => ({
        cuenta: it.cuenta || it.code,
        desc:   it.desc || it.nombre || it.concepto || "—",
        monto:  it.amt || it.monto || it.total || 0,
        isCFDI: false,
      }));

  // Agrupar por cuenta para el resumen de categorías
  const porCuenta = {};
  lineas.forEach(l => {
    const key = l.cuenta || "6121200001";
    if (!porCuenta[key]) porCuenta[key] = { monto: 0, items: [] };
    porCuenta[key].monto += l.monto;
    porCuenta[key].items.push(l);
  });
  const totalLineas = lineas.reduce((a, l) => a + l.monto, 0);

  // Exportar resumen como CSV
  const exportarResumen = () => {
    const rows = [["Cuenta","Tipo de gasto","Descripción","Monto","UUID/Referencia"]];
    lineas.forEach(l => {
      const meta = window.findCuenta(l.cuenta) || { nombre: "—" };
      rows.push([l.cuenta || "—", meta.nombre, l.desc, l.monto, l.uuid || "—"]);
    });
    rows.push(["","","TOTAL", totalLineas, ""]);
    const csv = rows.map(r => r.map(x => '"' + String(x).replace(/"/g, '""') + '"').join(",")).join('
');
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = s.id + "_desglose.csv";
    a.click();
  };

  // Íconos por grupo de gasto
  const iconoGrupo = { Transporte:"plane", Hospedaje:"calendar", Alimentos:"sparkle", Impuestos:"receipt", Otros:"file" };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:720}}>
        {/* Header */}
        <div className="modal-head">
          <div>
            <h2 className="modal-title">{s.id}</h2>
            <div className="card-sub" style={{marginTop:2}}>{s.concepto}</div>
          </div>
          <div className="row">
            <TipoBadge tipo={s.tipo}/>
            <StatusBadge status={s.status}/>
            <div className="icon-btn" onClick={onClose}><Icon name="x" size={14}/></div>
          </div>
        </div>

        <div className="modal-body">
          <Stepper status={s.status} dates={dates}/>

          {/* Info básica */}
          <div className="form-grid cols-3" style={{marginTop:20}}>
            <div className="field"><label>Solicitante</label>
              <div className="row">
                <div className="avatar sm">{u.iniciales}</div>
                <div>
                  <div style={{fontSize:13}}>{u.nombre}</div>
                  <div className="muted mono" style={{fontSize:11}}>{u.correo}</div>
                </div>
              </div>
            </div>
            <div className="field"><label>Centro de beneficio</label>
              <div>{c.nombre}<div className="muted mono" style={{fontSize:11}}>{c.id} · {c.depto}</div></div>
            </div>
            <div className="field"><label>Monto total</label>
              <div className="mono" style={{fontSize:20,fontWeight:700}}>{window.fmtMXN(s.monto)}</div>
            </div>
          </div>

          {/* ── Resumen por categoría de gasto ── */}
          {lineas.length > 0 && (
            <>
              <div className="divider"></div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <h3 className="card-title" style={{fontSize:14,margin:0}}>
                  Desglose de gastos
                  <span className="muted" style={{fontWeight:400,fontSize:12,marginLeft:8}}>
                    {lineas.length} concepto{lineas.length>1?"s":""}
                  </span>
                </h3>
                <button className="btn sm" onClick={exportarResumen}>
                  <Icon name="download" size={12}/> Descargar CSV
                </button>
              </div>

              {/* Tarjetas por categoría */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:16}}>
                {Object.entries(porCuenta).map(([cuentaKey, data]) => {
                  const meta = window.findCuenta(cuentaKey) || {nombre:cuentaKey,grupo:"Otros"};
                  const pct = totalLineas > 0 ? (data.monto/totalLineas*100) : 0;
                  const icon = iconoGrupo[meta.grupo] || "file";
                  return (
                    <div key={cuentaKey} style={{
                      background:"var(--surface-2,rgba(255,255,255,.05))",
                      borderRadius:"var(--r-md,8px)", padding:"12px 14px",
                      border:"1px solid var(--border)",
                    }}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                        <Icon name={icon} size={13} style={{color:"var(--accent)"}}/>
                        <span style={{fontSize:11,fontWeight:600,color:"var(--text-2,rgba(255,255,255,.6))"}}>{meta.nombre}</span>
                      </div>
                      <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>{window.fmtMXN(data.monto)}</div>
                      <div style={{height:3,background:"var(--border)",borderRadius:2,overflow:"hidden"}}>
                        <div style={{height:"100%",width:pct+"%",background:"var(--accent)",borderRadius:2}}></div>
                      </div>
                      <div style={{fontSize:10,color:"var(--text-3,rgba(255,255,255,.35))",marginTop:4}}>
                        {pct.toFixed(0)}% del total · <span className="mono muted">{cuentaKey}</span>
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Tabla detallada de líneas */}
              <div className="table-wrap" style={{border:"none",padding:0}}>
                <table className="t">
                  <thead>
                    <tr>
                      <th>Tipo de gasto</th>
                      <th>Descripción / Emisor</th>
                      {lineas.some(l=>l.isCFDI) && <th style={{width:130}}>UUID</th>}
                      {lineas.some(l=>l.iva) && <th className="right">IVA</th>}
                      <th className="right">Importe</th>
                    </tr>
                  </thead>
                  <tbody>
                    {lineas.map((l, i) => {
                      const meta = window.findCuenta(l.cuenta) || {nombre:l.cuenta||"—",cuenta:l.cuenta||""};
                      return (
                        <tr key={i}>
                          <td>
                            <div style={{fontSize:12,fontWeight:500}}>{meta.nombre}</div>
                            <div className="mono muted" style={{fontSize:10}}>{meta.cuenta}</div>
                          </td>
                          <td style={{fontSize:12}}>
                            <div>{l.desc}</div>
                            {l.emisor && l.emisor !== l.desc && (
                              <div className="muted" style={{fontSize:11}}>{l.emisor}</div>
                            )}
                          </td>
                          {lineas.some(ln=>ln.isCFDI) && (
                            <td className="mono muted" style={{fontSize:10}}>{l.uuid || "—"}</td>
                          )}
                          {lineas.some(ln=>ln.iva) && (
                            <td className="num muted" style={{fontSize:12}}>{l.iva ? window.fmtMXN(l.iva) : "—"}</td>
                          )}
                          <td className="num" style={{fontWeight:600}}>{window.fmtMXN(l.monto)}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot>
                    <tr>
                      <td colSpan={lineas.some(l=>l.isCFDI) ? (lineas.some(l=>l.iva)?4:3) : (lineas.some(l=>l.iva)?3:2)}
                        style={{textAlign:"right",padding:"8px 10px",fontWeight:600,borderTop:"1px solid var(--border)"}}>
                        Total
                      </td>
                      <td className="num" style={{fontWeight:700,fontSize:15,borderTop:"1px solid var(--border)"}}>
                        {window.fmtMXN(totalLineas)}
                      </td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </>
          )}

          {/* ── Archivos adjuntos ── */}
          {(() => {
            const archivos = s.cfdi && s.cfdi.length > 0
              ? s.cfdi.map((cf,i) => ({ nombre: (cf.emisor||"Factura")+"_"+i+".xml", uuid: cf.uuid, tipo:"XML", total: cf.total }))
              : s.comprobantes > 0
                ? Array.from({length: s.comprobantes}, (_,i) => ({ nombre:"comprobante_"+(i+1)+".xml", tipo:"XML", total:null }))
                : [];

            if (!archivos.length) return null;
            return (
              <>
                <div className="divider"></div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <h3 className="card-title" style={{fontSize:14,margin:0}}>
                    Archivos adjuntos
                    <span className="muted" style={{fontWeight:400,fontSize:12,marginLeft:8}}>{archivos.length} archivo{archivos.length>1?"s":""}</span>
                  </h3>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {archivos.map((f,i) => (
                    <button key={i}
                      onClick={() => {
                        // En producción aquí iría el link real al archivo almacenado
                        // Por ahora generamos un XML de muestra descargable
                        const xmlContent = f.uuid
                          ? '<?xml version="1.0"?><Comprobante UUID="'+f.uuid+'" Emisor="'+f.nombre+'" Total="'+(f.total||0)+'"/>'
                          : '<?xml version="1.0"?><Comprobante Folio="'+s.id+'" Archivo="'+(i+1)+'"/>';
                        const a = document.createElement("a");
                        a.href = "data:application/xml;charset=utf-8," + encodeURIComponent(xmlContent);
                        a.download = s.id + "_" + f.nombre;
                        a.click();
                      }}
                      style={{
                        display:"flex",alignItems:"center",gap:8,
                        padding:"8px 12px",borderRadius:"var(--r-md,8px)",
                        border:"1px solid var(--border)",background:"var(--surface-2,rgba(255,255,255,.05))",
                        cursor:"pointer",fontFamily:"inherit",color:"var(--text)",
                        fontSize:12,transition:"all .15s",
                      }}
                      onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"}
                      onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}
                    >
                      <span style={{
                        background:"var(--accent-soft,rgba(197,242,77,.15))",color:"var(--accent)",
                        fontWeight:700,fontSize:10,padding:"2px 5px",borderRadius:4,fontFamily:"monospace"
                      }}>{f.tipo}</span>
                      <span style={{maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.nombre}</span>
                      {f.total && <span className="muted mono" style={{fontSize:11}}>{window.fmtMXN(f.total)}</span>}
                      <Icon name="download" size={12} style={{color:"var(--accent)",marginLeft:2}}/>
                    </button>
                  ))}
                </div>
                <div style={{fontSize:11,color:"var(--text-3,rgba(255,255,255,.35))",marginTop:8}}>
                  En producción estos archivos se descargan del servidor de almacenamiento.
                </div>
              </>
            );
          })()}

          {/* ── Bitácora ── */}
          <div className="divider"></div>
          <h3 className="card-title" style={{fontSize:14,marginBottom:12}}>Bitácora</h3>
          <div className="timeline">
            <div className="tl-row">
              <div className="tl-dot done"><Icon name="check" size={11}/></div>
              <div className="tl-content">
                <div className="tl-title">{u.nombre} creó la solicitud</div>
                <div className="tl-meta">{window.fmtFecha(s.fecha)}</div>
              </div>
            </div>
            {dates.autorizado ? (
              <div className="tl-row">
                <div className="tl-dot done"><Icon name="check" size={11}/></div>
                <div className="tl-content">
                  <div className="tl-title">Gerente autorizó</div>
                  <div className="tl-meta">{window.fmtFecha(dates.autorizado)}</div>
                </div>
              </div>
            ) : (
              <div className="tl-row">
                <div className="tl-dot">2</div>
                <div className="tl-content"><div className="tl-title muted">Esperando autorización gerencial</div></div>
              </div>
            )}
            {dates.liberado && (
              <div className="tl-row">
                <div className="tl-dot done"><Icon name="check" size={11}/></div>
                <div className="tl-content">
                  <div className="tl-title">Tesorería liberó fondos</div>
                  <div className="tl-meta">{window.fmtFecha(dates.liberado)}</div>
                </div>
              </div>
            )}
            {s.status === "rechazado" && s.motivoRechazo && (
              <div className="tl-row">
                <div className="tl-dot" style={{background:"var(--danger)",color:"#fff",border:"none"}}>✕</div>
                <div className="tl-content">
                  <div className="tl-title" style={{color:"var(--danger)"}}>Rechazado</div>
                  <div className="tl-note">{s.motivoRechazo}</div>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function applyTokens(t) {
  const root = document.documentElement;
  const a = ACCENTS[t.accent] || ACCENTS.lime;
  root.style.setProperty("--accent", a.v);
  root.style.setProperty("--accent-2", a.v2);
  root.style.setProperty("--accent-soft", a.soft);
  root.style.setProperty("--accent-fg", a.fg);
  root.dataset.density = t.density;
  root.dataset.theme = t.theme;
}

function resolveContent(role, page, userId, setDetailId, setPage, onLogout) {
  // Perfil — disponible para todos
  if (page === "perfil") return <window.PerfilPage userId={userId} onLogout={onLogout}/>;

  if (role === "usuario") {
    if (page === "dash")           return <UserDashboard userId={userId} openDetail={setDetailId} setPage={setPage}/>;
    if (page === "anticipos")      return <SolicitarAnticipo setPage={setPage}/>;
    if (page === "comprobaciones") return <NuevaComprobacion setPage={setPage}/>;
    if (page === "reembolsos")     return <Reembolsos userId={userId}/>;
    // fallback
    return <UserDashboard userId={userId} openDetail={setDetailId} setPage={setPage}/>;
  }

  if (role === "gerente") {
    if (page === "bandeja")          return <GerenteBandeja openDetail={setDetailId}/>;
    if (page === "reportes")         return <Reportes/>;
    if (page === "equipo")           return <GerenteEquipo/>;
    if (page === "historial")        return <GerenteHistorial openDetail={setDetailId}/>;
    if (page === "mis-solicitudes")  return <UserDashboard userId={userId} openDetail={setDetailId} setPage={setPage}/>;
    if (page === "anticipos")        return <SolicitarAnticipo setPage={setPage}/>;
    if (page === "reembolsos")       return <Reembolsos userId={userId}/>;
    if (page === "comprobaciones")   return <NuevaComprobacion setPage={setPage} userId={userId}/>;
    return <GerenteBandeja openDetail={setDetailId}/>;
  }

  if (role === "tesoreria") {
    if (page === "liberacion") return <TesoreriaBandeja openDetail={setDetailId}/>;
    if (page === "pagados")    return <TesoreriaPagados openDetail={setDetailId}/>;
    if (page === "deudores")   return <Reportes/>;
    if (page === "reportes")   return <Reportes/>;
    return <TesoreriaBandeja openDetail={setDetailId}/>;
  }

  if (role === "admin") {
    if (page === "usuarios")  return <AdminUsuarios/>;
    if (page === "centros")   return <AdminCentros/>;
    if (page === "catalogo")  return <AdminCatalogo/>;
    if (page === "reportes")  return <Reportes/>;
    if (page === "ajustes")   return <AdminAjustes/>;
    return <AdminUsuarios/>;
  }

  return null;
}

function TesoreriaPagados({ openDetail }) {
  const pagados = window.SOLICITUDES.filter(s => s.status==="liberado");

  const filtrados = pagados.filter(s => {
    if (!busqueda.trim()) return true;
    const q=busqueda.toLowerCase();
    const u=window.findUser(s.usuario);
    return s.id.toLowerCase().includes(q)||u.nombre.toLowerCase().includes(q)||s.concepto.toLowerCase().includes(q);
  });
  const exportar = () => {
    const rows=[["Folio","Tipo","Beneficiario","Concepto","Fecha","Monto"]];
    filtrados.forEach(s=>{const u=window.findUser(s.usuario);rows.push([s.id,s.tipo,u.nombre,s.concepto,window.fmtFecha(s.fecha),s.monto]);});
    const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`pagados_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  };
  return (
    <>
      <div className="page-head">
        <div><h1 className="page-title">Pagados</h1>
          <div className="page-sub">Solicitudes liberadas · {pagados.length} registros · {window.fmtMXN(pagados.reduce((a,s)=>a+s.monto,0))}</div>

        <span style={labelStyle}>Densidad</span>
        <div style={rowStyle}>
          <button style={chipStyle(density==="comfortable")} onClick={()=>onDensity("comfortable")}>Cómoda</button>
          <button style={chipStyle(density==="compact")}     onClick={()=>onDensity("compact")}>Compacta</button>
        </div>

        {isAdmin && onRole && (
          <>
            <span style={labelStyle}>Ver como rol</span>
            <div style={rowStyle}>
              {ROLES_UI.map(r=>(
                <button key={r.value} style={chipStyle(role===r.value)} onClick={()=>onRole(r.value)}>
                  {r.label}
                </button>
              ))}
            </div>
          </>
        )}
      </div>
    </>
  );
}

// ── Pantalla de Login ────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [correo, setCorreo]   = React.useState("");
  const [pwd, setPwd]         = React.useState("");
  const [error, setError]     = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [showPwd, setShowPwd] = React.useState(false);
  const [screen, setScreen]   = React.useState("login"); // "login" | "recovery" | "token" | "newpwd"
  const [recCorreo, setRecCorreo] = React.useState("");
  const [recToken, setRecToken]   = React.useState("");
  const [recPwd, setRecPwd]       = React.useState("");
  const [recPwd2, setRecPwd2]     = React.useState("");
  const [recMsg, setRecMsg]       = React.useState("");
  const [sentToken, setSentToken] = React.useState("");

  const handleLogin = (e) => {
    e.preventDefault();
    setError("");
    if (!correo.trim() || !pwd) { setError("Ingresa tu correo y contraseña"); return; }
    setLoading(true);
    setTimeout(() => {
      const user = window.checkPassword(correo.trim(), pwd);
      if (user) {
        onLogin(user);
      } else {
        setError("Correo o contraseña incorrectos");
        setLoading(false);
      }
    }, 600);
  };

  const handleSendToken = (e) => {
    e.preventDefault();
    setRecMsg("");
    const u = window.findUserByEmail(recCorreo.trim());
    if (!u) { setRecMsg("No encontramos una cuenta con ese correo"); return; }
    const token = window.generateToken(recCorreo.trim());
    setSentToken(token);
    // En producción se enviaría por email — aquí lo mostramos en pantalla
    setRecMsg("TOKEN_SENT:" + token);
    setScreen("token");
  };

  const handleVerifyToken = (e) => {
    e.preventDefault();
    if (window.verifyToken(recCorreo.trim(), recToken.trim())) {
      setScreen("newpwd");
      setRecMsg("");
    } else {
      setRecMsg("Código incorrecto o expirado");
    }
  };

  const handleNewPwd = (e) => {
    e.preventDefault();
    if (recPwd.length < 4) { setRecMsg("La contraseña debe tener al menos 4 caracteres"); return; }
    if (recPwd !== recPwd2) { setRecMsg("Las contraseñas no coinciden"); return; }
    const u = window.findUserByEmail(recCorreo.trim());
    if (u) { u.password = recPwd; }
    delete window.AUTH_TOKENS[recCorreo.trim()];
    setRecMsg("ok");
    setTimeout(() => { setScreen("login"); setRecMsg(""); setRecCorreo(""); setRecToken(""); setRecPwd(""); setRecPwd2(""); }, 1800);
  };

  const cardStyle = {
    width: 400, background: "var(--color-bg, var(--surface-1, #18191c))",
    border: "1px solid var(--border)", borderRadius: 16, padding: "36px 40px",
    boxShadow: "0 24px 64px rgba(0,0,0,.45)"
  };
  const inputStyle = {
    width:"100%", padding:"10px 12px", fontSize:14,
    border:"1px solid var(--border)", borderRadius:8,
    background:"var(--surface-2,rgba(255,255,255,.06))", color:"var(--text)",
    fontFamily:"inherit", outline:"none", boxSizing:"border-box"
  };
  const btnStyle = {
    width:"100%", padding:"11px", fontSize:14, fontWeight:600, cursor:"pointer",
    border:"none", borderRadius:8, background:"var(--accent)", color:"var(--accent-fg,#0a0b0f)",
    fontFamily:"inherit", marginTop:4
  };
  const linkStyle = {
    background:"none", border:"none", color:"var(--accent)", fontSize:12,
    cursor:"pointer", fontFamily:"inherit", padding:0, textDecoration:"underline"
  };

  const wrapStyle = {
    position:"fixed", inset:0, display:"flex", alignItems:"center", justifyContent:"center",
    background:"var(--surface-0,#111214)", zIndex:500
  };

  if (screen === "recovery" || screen === "token" || screen === "newpwd") {
    return (
      <div style={wrapStyle}>
        <div style={cardStyle}>
          <div style={{marginBottom:28}}>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--accent)",marginBottom:6}}>Viáticos</div>
            <h1 style={{fontSize:22,fontWeight:700,margin:"0 0 4px",letterSpacing:"-0.02em"}}>
              {screen==="recovery" ? "Recuperar contraseña" : screen==="token" ? "Verificar código" : "Nueva contraseña"}
            </h1>
            <p style={{fontSize:13,color:"var(--text-2,rgba(255,255,255,.5))",margin:0}}>
              {screen==="recovery" && "Ingresa tu correo para recibir un código"}
              {screen==="token" && `Código enviado a ${recCorreo}`}
              {screen==="newpwd" && "Crea tu nueva contraseña"}
            </p>
          </div>

          {screen === "recovery" && (
            <form onSubmit={handleSendToken} style={{display:"flex",flexDirection:"column",gap:14}}>
              <input style={inputStyle} type="email" placeholder="tu@correo.com"
                value={recCorreo} onChange={e=>setRecCorreo(e.target.value)} autoFocus/>
              {recMsg && !recMsg.startsWith("TOKEN_SENT") && (
                <div style={{fontSize:12,color:"var(--danger,#e24b4a)"}}>{recMsg}</div>
              )}
              <button style={btnStyle} type="submit">Enviar código de recuperación</button>
            </form>
          )}

          {screen === "token" && (
            <form onSubmit={handleVerifyToken} style={{display:"flex",flexDirection:"column",gap:14}}>
              {/* Simulación: mostramos el token en pantalla */}
              <div style={{padding:"10px 14px",background:"rgba(255,255,255,.07)",borderRadius:8,fontSize:13}}>
                <div style={{fontSize:11,opacity:.6,marginBottom:4}}>Código de recuperación (demo — en prod llega por email):</div>
                <div style={{fontFamily:"monospace",fontSize:22,fontWeight:700,letterSpacing:"0.15em",color:"var(--accent)"}}>{sentToken}</div>
              </div>
              <input style={{...inputStyle,fontFamily:"monospace",letterSpacing:"0.15em",textAlign:"center",fontSize:18}}
                placeholder="XXXXXXXX" maxLength={8}
                value={recToken} onChange={e=>setRecToken(e.target.value.toUpperCase())} autoFocus/>
              {recMsg && <div style={{fontSize:12,color:"var(--danger,#e24b4a)"}}>{recMsg}</div>}
              <button style={btnStyle} type="submit">Verificar código</button>
            </form>
          )}

          {screen === "newpwd" && (
            <form onSubmit={handleNewPwd} style={{display:"flex",flexDirection:"column",gap:14}}>
              <input style={inputStyle} type="password" placeholder="Nueva contraseña (mín. 4 caracteres)"
                value={recPwd} onChange={e=>setRecPwd(e.target.value)} autoFocus/>
              <input style={inputStyle} type="password" placeholder="Confirmar contraseña"
                value={recPwd2} onChange={e=>setRecPwd2(e.target.value)}/>
              {recMsg === "ok"
                ? <div style={{fontSize:13,color:"var(--success,#1d9e75)",fontWeight:500}}>✓ Contraseña actualizada. Iniciando sesión…</div>
                : recMsg && <div style={{fontSize:12,color:"var(--danger,#e24b4a)"}}>{recMsg}</div>
              }
              <button style={btnStyle} type="submit">Guardar contraseña</button>
            </form>
          )}

          <div style={{marginTop:20,textAlign:"center"}}>
            <button style={linkStyle} onClick={()=>{setScreen("login");setRecMsg("");}}>← Volver al inicio de sesión</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={wrapStyle}>
      <div style={cardStyle}>
        <div style={{marginBottom:32}}>
          <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--accent)",marginBottom:8}}>Casa Zapata</div>
          <h1 style={{fontSize:26,fontWeight:700,margin:"0 0 6px",letterSpacing:"-0.03em"}}>Viáticos</h1>
          <p style={{fontSize:13,color:"var(--text-2,rgba(255,255,255,.5))",margin:0}}>Control de gastos de viaje</p>
        </div>

        <form onSubmit={handleLogin} style={{display:"flex",flexDirection:"column",gap:16}}>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <label style={{fontSize:12,fontWeight:500,color:"var(--text-2,rgba(255,255,255,.6))"}}>Correo electrónico</label>
            <input style={inputStyle} type="email" placeholder="tu@casazapata.mx"
              value={correo} onChange={e=>{setCorreo(e.target.value);setError("");}}
              autoComplete="email" autoFocus/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
              <label style={{fontSize:12,fontWeight:500,color:"var(--text-2,rgba(255,255,255,.6))"}}>Contraseña</label>
              <button type="button" style={linkStyle}
                onClick={()=>{setScreen("recovery");setRecCorreo(correo);}}>
                ¿Olvidaste tu contraseña?
              </button>
            </div>
            <div style={{position:"relative"}}>
              <input style={{...inputStyle,paddingRight:40}}
                type={showPwd?"text":"password"} placeholder="••••••••"
                value={pwd} onChange={e=>{setPwd(e.target.value);setError("");}}
                autoComplete="current-password"/>
              <button type="button"
                onClick={()=>setShowPwd(v=>!v)}
                style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
                  background:"none",border:"none",color:"var(--text-3,rgba(255,255,255,.35))",cursor:"pointer",padding:4}}>
                <Icon name={showPwd?"eye":"eye"} size={15}/>
              </button>
            </div>
          </div>

          {error && (
            <div style={{padding:"8px 12px",background:"rgba(226,75,74,.12)",border:"1px solid rgba(226,75,74,.4)",
              borderRadius:8,fontSize:13,color:"#e24b4a"}}>
              {error}
            </div>
          )}

          <button style={{...btnStyle,opacity:loading?0.7:1}} type="submit" disabled={loading}>
            {loading ? "Verificando…" : "Iniciar sesión"}
          </button>
        </form>

        <div style={{marginTop:24,padding:"14px 0 0",borderTop:"1px solid var(--border)",
          fontSize:11,color:"var(--text-3,rgba(255,255,255,.3))",textAlign:"center"}}>
          Contraseña inicial: <span style={{fontFamily:"monospace",color:"var(--text-2,rgba(255,255,255,.5))"}}>1234</span>
        </div>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [t, setTweak]       = window.useTweaks(TWEAK_DEFAULTS);
  const [detailId, setDetailId] = React.useState(null);
  const [session, setSession]   = React.useState(null); // { user } | null

  const [page, setPage] = React.useState(() => DEFAULT_PAGE[TWEAK_DEFAULTS.role] || "dash");

  React.useEffect(() => { applyTokens(t); }, [t]);

  // ── Login / logout ────────────────────────────────────────────────────────
  const handleLogin = (user) => {
    // Map role from user data to tweak role key
    const roleMap = { usuario:"usuario", gerente:"gerente", tesoreria:"tesoreria", admin:"admin" };
    const role = roleMap[user.rol] || "usuario";
    setSession({ user });
    setPage(DEFAULT_PAGE[role] || "dash");
    setTweak("role", role);
  };

  const handleLogout = () => {
    setSession(null);
    setPage("dash");
  };

  if (!session) {
    return <LoginScreen onLogin={handleLogin}/>;
  }

  // Rol SIEMPRE viene del usuario logueado — no se puede cambiar desde la UI
  const role   = session.user.rol;   // "usuario" | "gerente" | "tesoreria" | "admin"
  const userId = session.user.id;
  const isAdmin = role === "admin";
  const isMobileUserView = role === "usuario" && t.density === "mobile";

  const validPages = VALID_PAGES[role] || [];
  const activePage = validPages.includes(page) ? page : DEFAULT_PAGE[role];

  const PAGE_LABELS = {
    dash:"Mi resumen", anticipos:"Mis anticipos", comprobaciones:"Comprobaciones", reembolsos:"Reembolsos",
    bandeja:"Por aprobar", equipo:"Mi equipo", historial:"Historial", reportes:"Reportes",
    liberacion:"Por liberar", pagados:"Pagados", deudores:"Deudores",
    usuarios:"Usuarios", centros:"Centros de beneficio", catalogo:"Catálogo de gastos", ajustes:"Ajustes",
    perfil:"Mi perfil",
  };
  const crumbs = ["Viáticos", window.ROLE_LABELS[role], PAGE_LABELS[activePage] || activePage];

  // Solo admin puede cambiar de perspectiva (para soporte / supervisión)
  const handleSetRole = (r) => {
    if (!isAdmin) return;  // solo admin puede cambiar de perspectiva
    setPage(DEFAULT_PAGE[r] || "dash");
    setTweak("role", r);
  };

  // Admin puede operar como cualquier rol; los demás usan su rol fijo
  // Rol activo: admin puede cambiar perspectiva, los demás siempre usan su rol de sesión
  const activeRole = isAdmin ? (t.role || role) : role;

  const content = resolveContent(activeRole, activePage, userId, setDetailId, setPage, handleLogout);

  return (
    <>
      {isMobileUserView ? (
        <MobileApp userId={userId} onLogout={handleLogout}/>
      ) : (
        <div className="app">
          <Sidebar role={activeRole} page={activePage} setPage={setPage} onLogout={handleLogout}/>
          <div className="main">
            <Topbar role={activeRole} setRole={handleSetRole} crumbs={crumbs} isAdmin={isAdmin}
              onNew={activeRole === "usuario" ? () => setPage("anticipos") : null}/>
            <div className="content">{content}</div>
          </div>
        </div>
      )}

      {detailId && <DetalleModal id={detailId} onClose={() => setDetailId(null)}/>}

      {/* TweaksPanel: siempre en DEV_MODE, solo admin en producción */}
      <ThemePanel
        theme={t.theme} onTheme={v=>setTweak("theme",v)}
        accent={t.accent} onAccent={v=>setTweak("accent",v)}
        density={t.density} onDensity={v=>setTweak("density",v)}
        isAdmin={isAdmin}
        role={t.role||role} onRole={isAdmin ? handleSetRole : null}
      />
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);


</script>
</body>
</html>
