      </>
    );
  }
  const updItem = (id, k, v) => setItems(items.map(i => i.id === id ? { ...i, [k]: k === "total" || k === "subtotal" || k === "iva" ? parseFloat(v) || 0 : v } : i));
  const delItem = (id) => setItems(items.filter(i => i.id !== id));
  const total = items.reduce((a,i) => a + i.total, 0);
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };
  const handleEnviar = () => {
    if (enviado) return;                              // bloqueo de doble envío
    if (items.length === 0) {
      showToast("⚠ Agrega al menos un comprobante antes de enviar");
      return;
    }
    const totalComp = items.reduce((a, i) => a + (i.total || 0), 0);
    const id = "CMP-" + new Date().getFullYear() + "-" + String(Date.now()).slice(-4);

    // Registrar la comprobación en SOLICITUDES
    const nueva = {
      id,
      tipo: "comprobacion",
      concepto: "Comprobación " + anticipoSel.id,
      usuario: userId,
      monto: totalComp,
      fecha: new Date(),
      status: "solicitado",
      anticipoRef: anticipoSel.id,
      comprobantes: items.length,
      cfdi: items,
      saldoPendiente: 0,
    };
    window.SOLICITUDES.unshift(nueva);

    // Marcar el anticipo como comprobado parcial si sobra saldo
    const antic = window.SOLICITUDES.find(s => s.id === anticipoSel.id);
    if (antic) {
      const nuevoSaldo = Math.max(0, (antic.saldoPendiente || 0) - totalComp);
      antic.saldoPendiente = Math.round(nuevoSaldo * 100) / 100;
      antic.status = nuevoSaldo <= 0 ? "comprobado" : "parcial";
      antic.comprobantes = (antic.comprobantes || 0) + items.length;
    }

    // Actualizar la lista de pendientes para que desaparezca el anticipo comprobado
    setPendientes(prev =>
      prev.filter(p => p.id !== anticipoSel.id || (antic && antic.saldoPendiente > 0))
    );

    setEnviado(true);
    showToast("✓ Comprobación " + id + " enviada a autorización");
    setTimeout(() => setPage && setPage("dash"), 1400);
  };
  const handleBorrador = () => {
    const id = `BOR-${Date.now().toString().slice(-6)}`;
    window.BORRADORES = window.BORRADORES || [];
    window.BORRADORES.push({ id, concepto: "Comprobación en captura", fecha: new Date(), tipo: "comprobacion", items });
    showToast(`✓ Borrador ${id} guardado · velo en "Comprobaciones"`);
  };
  const handleCancelar = () => setPage && setPage("dash");

  return (
    <>
      {toast && (
        <div style={{position:"fixed", bottom:24, right:24, background:"var(--success-soft)", border:"1px solid oklch(from var(--success) l c h / 0.4)", color:"var(--success)", padding:"12px 18px", borderRadius:"var(--r-lg)", zIndex:100, fontWeight:500, fontSize:13}}>
          {toast}
        </div>
      )}
      <div className="page-head">
        <div>
          <button className="btn sm ghost" onClick={() => setAnticipoSel(null)} style={{marginBottom:8}}><Icon name="chevR" size={11} style={{transform:"rotate(180deg)"}}/> Volver a anticipos</button>
          <h1 className="page-title">Comprobar {anticipoSel.id}</h1>
          <div className="page-sub">{anticipoSel.concepto} · saldo {window.fmtMXN(anticipoSel.saldoPendiente)}</div>
        </div>
        <div className="row">
          <button className="btn ghost" onClick={handleCancelar}>Cancelar</button>
          <button className="btn" onClick={handleBorrador}>Guardar borrador</button>
          <button className="btn primary"
            style={{opacity: enviado ? 0.5 : 1, pointerEvents: enviado ? "none" : "auto"}}
            onClick={handleEnviar}>
            {enviado ? "Enviado ✓" : "Enviar a autorización"}
          </button>
        </div>
      </div>

      <div className="two-col">
        <div>
          <div className="card" style={{marginBottom:14}}>
            <h3 className="card-title" style={{marginBottom:14}}>Sube tus comprobantes</h3>
            <CompUploader onAdd={(newItems) => { setItems([...items, ...newItems]); showToast(`✓ ${newItems.length} archivo${newItems.length>1?"s":""} procesado${newItems.length>1?"s":""}`); }}/>
          </div>

          <div className="card">
            <div className="card-head">
              <div>
                <h3 className="card-title">Comprobantes detectados</h3>
                <div className="card-sub">{items.length} facturas · IVA y cuenta sugeridos automáticamente</div>
              </div>
              <div className="row">
                <span className="muted" style={{fontSize:12}}>Total comprobado</span>
                <strong className="mono" style={{fontSize:16}}>{window.fmtMXN(total)}</strong>
              </div>
            </div>
            <div className="table-wrap" style={{border:"none"}}>
              <table className="t">
                <thead>
                  <tr>
                    <th>UUID</th>
                    <th>Emisor</th>
                    <th>Concepto</th>
                    <th className="right">Total</th>
                    <th>Cuenta sugerida</th>
                    <th>Confianza</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {items.map(c => {
                    const cuenta = window.findCuenta(c.cuenta);
                    const editing = editId === c.id;
                    if (editing) {
                      return (
                        <tr key={c.id} style={{background:"var(--surface-2)"}}>
                          <td className="id-cell">{c.uuid}</td>
                          <td><input className="input" value={c.emisor} onChange={e => updItem(c.id, "emisor", e.target.value)}/></td>
                          <td><input className="input" value={c.concepto} onChange={e => updItem(c.id, "concepto", e.target.value)}/></td>
                          <td><input className="input mono" style={{textAlign:"right"}} value={c.total} onChange={e => updItem(c.id, "total", e.target.value)}/></td>
                          <td>
                            <select className="select" value={c.cuenta} onChange={e => updItem(c.id, "cuenta", e.target.value)}>
                              {window.CATALOGO_GASTOS.map(g => <option key={g.cuenta} value={g.cuenta}>{g.cuenta} · {g.nombre}</option>)}
                            </select>
                          </td>
                          <td><span className="muted" style={{fontSize:11}}>—</span></td>
                          <td className="right">
                            <div style={{display:"inline-flex", gap:4}}>
                              <button className="icon-btn" onClick={() => setEditId(null)} title="Guardar"><Icon name="check" size={13}/></button>
                              <button className="icon-btn" onClick={() => delItem(c.id)} title="Eliminar"><Icon name="x" size={13}/></button>
                            </div>
                          </td>
                        </tr>
                      );
                    }
                    return (
                      <tr key={c.id}>
                        <td className="id-cell">{c.uuid}</td>
                        <td>{c.emisor}</td>
                        <td className="muted">{c.concepto}</td>
                        <td className="num">{window.fmtMXN(c.total)}</td>
                        <td>
                          <div style={{display:"flex", flexDirection:"column", gap:2}}>
                            <span style={{fontSize:12.5}}>{cuenta.nombre}</span>
                            <span className="mono muted" style={{fontSize:11}}>{cuenta.cuenta}</span>
                          </div>
                        </td>
                        <td>
                          <div className={`conf ${c.confianza < 0.9 ? "warn" : ""}`}>
                            <div className="meter"><div className="fill" style={{width: `${c.confianza*100}%`}}></div></div>
                            {Math.round(c.confianza*100)}%
                          </div>
                        </td>
                        <td className="right">
                          <button className="icon-btn" onClick={() => setEditId(c.id)} title="Editar"><Icon name="settings" size={13}/></button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div>
          <div className="card" style={{marginBottom:14}}>
            <h3 className="card-title">Resumen</h3>
            <div className="divider" style={{margin:"12px 0"}}></div>
            <div className="spread"><span className="muted">Anticipo recibido</span><strong className="mono">{window.fmtMXN(anticipoSel.monto)}</strong></div>
            <div className="spread" style={{marginTop:8}}><span className="muted">Total comprobado</span><strong className="mono">{window.fmtMXN(total)}</strong></div>
            <div className="divider"></div>
            <div className="spread">
              <span style={{fontWeight:600}}>Saldo a devolver</span>
              <strong className="mono" style={{fontSize:18, color:"var(--accent)"}}>{window.fmtMXN(anticipoSel.monto - total)}</strong>
            </div>
            <div className="card-sub" style={{marginTop:6}}>El usuario debe depositar este monto a tesorería</div>
          </div>

          <div className="card">
            <h3 className="card-title">Por cuenta contable</h3>
            <div className="divider" style={{margin:"12px 0"}}></div>
            {(() => {
              const groups = {};
              items.forEach(c => { groups[c.cuenta] = (groups[c.cuenta] || 0) + c.total; });
              return Object.entries(groups).map(([cuenta, monto]) => {
                const meta = window.findCuenta(cuenta);
                return (
                  <div key={cuenta} className="spread" style={{padding:"6px 0"}}>
                    <div>
                      <div style={{fontSize:13}}>{meta.nombre}</div>
                      <div className="mono muted" style={{fontSize:11}}>{cuenta}</div>
                    </div>
                    <strong className="mono">{window.fmtMXN(monto)}</strong>
                  </div>
                );
              });
            })()}
          </div>
        </div>
      </div>
    </>
  );
}

function Reembolsos({ userId }) {
  const [solicitudes, setSolicitudes] = React.useState(
    () => window.SOLICITUDES.filter(s => s.tipo === "reembolso")
  );
  const [filtro, setFiltro]   = React.useState("todas");
  const [busqueda, setBusqueda] = React.useState("");
  const [mostrarForm, setMostrarForm] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const [form, setForm] = React.useState({
    concepto: "", fecha: "", destino: "", notas: "",
  });
  const [desglose, setDesglose] = React.useState([
    { id: 1, nombre: "", monto: 0, cuenta: "6122900005" },
  ]);
  const [archivos, setArchivos] = React.useState([]);
  const [errores, setErrores] = React.useState({});

  const showToast = (msg, tipo="ok") => { setToast({msg,tipo}); setTimeout(()=>setToast(null),3000); };

  const updDesg = (id,k,v) => setDesglose(desglose.map(d => d.id===id ? {...d,[k]:v} : d));
  const addDesg = () => setDesglose([...desglose, {id:Date.now(),nombre:"",monto:0,cuenta:"6122900005"}]);
  const delDesg = id => setDesglose(desglose.filter(d => d.id!==id));
  const totalDesg = desglose.reduce((a,d)=>a+(parseFloat(d.monto)||0),0);

  const validar = () => {
    const e = {};
    if (!form.concepto.trim()) e.concepto = "Requerido";
    if (!form.fecha.trim()) e.fecha = "Requerido";
    if (desglose.every(d=>!(parseFloat(d.monto)>0))) e.desglose = "Agrega al menos un concepto con monto";
    if (archivos.length===0) e.archivos = "Adjunta al menos un comprobante (XML o PDF)";
    setErrores(e);
    return Object.keys(e).length === 0;
  };

  const enviar = () => {
    if (!validar()) return;
    const id = "REE-" + Date.now().toString().slice(-6);
    const montoFinal = totalDesg > 0 ? totalDesg : archivos.reduce((a,c)=>a+(c.total||0),0);
    const nuevo = {
      id, tipo:"reembolso", concepto: form.concepto.trim(),
      usuario: userId, monto: montoFinal,
      fecha: new Date(), status:"solicitado", comprobantes: archivos.length,
      notas: form.notas,
      cfdi: archivos,
    };
    window.SOLICITUDES.unshift(nuevo);
    setSolicitudes(prev => [nuevo, ...prev]);
    setMostrarForm(false);
    setForm({concepto:"",fecha:"",destino:"",notas:""});
    setDesglose([{id:1,nombre:"",monto:0,cuenta:"6122900005"}]);
    setArchivos([]);
    showToast(`✓ Reembolso ${id} enviado a aprobación`);
  };

  const exportar = () => {
    const rows = [["Folio","Concepto","Fecha","Monto","Status","Comprobantes"]];
    solicitudesFiltradas.forEach(r =>
      rows.push([r.id, r.concepto, window.fmtFecha(r.fecha), r.monto, r.status, r.comprobantes + " archivos"])
    );
    const csv = rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
    const a = document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`reembolsos_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  };

  const enFlujo = solicitudes.filter(s=>["solicitado","autorizado"].includes(s.status));
  const liberados = solicitudes.filter(s=>s.status==="liberado");

  const solicitudesFiltradas = solicitudes
    .filter(s => filtro==="todas" || s.status===filtro)
    .filter(s => {
      if (!busqueda.trim()) return true;
      const q = busqueda.toLowerCase();
      return s.id.toLowerCase().includes(q) || s.concepto.toLowerCase().includes(q);
    });

  return (
    <>
      {toast && (
        <div style={{position:"fixed",bottom:24,right:24,zIndex:300,padding:"12px 18px",
          borderRadius:"var(--r-lg)",fontWeight:500,fontSize:13,
          background:"var(--success-soft)",color:"var(--success)",
          border:"1px solid var(--success)",boxShadow:"0 4px 20px rgba(0,0,0,.15)"}}>
          {toast.msg}
        </div>
      )}

      <div className="page-head">
        <div>
          <h1 className="page-title">Reembolsos</h1>
          <div className="page-sub">Gastos que pagaste de tu bolsa sin anticipo previo</div>
        </div>
        <button className="btn primary" onClick={()=>{setMostrarForm(!mostrarForm);setErrores({})}}>
          <Icon name="plus" size={14}/>
          {mostrarForm ? "Cancelar" : "Nuevo reembolso"}
        </button>
      </div>

      {/* Formulario nuevo reembolso */}
      {mostrarForm && (
        <div className="card" style={{marginBottom:18,border:"1px solid var(--accent)",borderRadius:"var(--r-lg)"}}>
          <h3 className="card-title" style={{marginBottom:16}}>Nuevo reembolso</h3>
          <div className="form-grid cols-2" style={{marginBottom:14}}>
            <div className="field">
              <label>Concepto / motivo *</label>
              <input className={`input ${errores.concepto?"error":""}`} value={form.concepto}
                placeholder="Ej: Comida con cliente sin anticipo"
                onChange={e=>setForm({...form,concepto:e.target.value})}/>
              {errores.concepto && <div style={{color:"var(--danger)",fontSize:12,marginTop:3}}>{errores.concepto}</div>}
            </div>
            <div className="field">
              <label>Fecha del gasto *</label>
              <input className={`input ${errores.fecha?"error":""}`} type="date" value={form.fecha}
                onChange={e=>setForm({...form,fecha:e.target.value})}/>
              {errores.fecha && <div style={{color:"var(--danger)",fontSize:12,marginTop:3}}>{errores.fecha}</div>}
            </div>
            <div className="field">
              <label>Lugar / destino</label>
              <input className="input" value={form.destino} placeholder="Ciudad, establecimiento"
                onChange={e=>setForm({...form,destino:e.target.value})}/>
            </div>
            <div className="field">
              <label>Notas adicionales</label>
              <input className="input" value={form.notas} placeholder="Opcional"
                onChange={e=>setForm({...form,notas:e.target.value})}/>
            </div>
          </div>

          <div className="divider"></div>
          <div className="spread" style={{marginBottom:10}}>
            <div className="label-tag">Desglose de gastos · total {window.fmtMXN(totalDesg)}</div>
            <button className="btn sm" onClick={addDesg}><Icon name="plus" size={12}/> Agregar línea</button>
          </div>
          {errores.desglose && <div style={{color:"var(--danger)",fontSize:12,marginBottom:8}}>{errores.desglose}</div>}

              <div key={d.id} style={{display:"grid",gridTemplateColumns:"1fr 200px 120px 30px",gap:8,alignItems:"center"}}>

                <select className="select" value={d.cuenta} onChange={e=>updDesg(d.id,"cuenta",e.target.value)}>

                </select>
                <input className="input mono" style={{textAlign:"right"}} value={d.monto} placeholder="0.00"
                  type="number" min="0" step="0.01"
                  onChange={e=>updDesg(d.id,"monto",e.target.value)}/>
                <button className="icon-btn" onClick={()=>delDesg(d.id)} title="Eliminar"><Icon name="x" size={13}/></button>
              </div>
            ))}
          </div>

          <div className="divider"></div>

          {/* Lector de XML/PDF igual que en Comprobaciones */}
          <div style={{marginBottom:14}}>
            <div className="spread" style={{marginBottom:10}}>
              <label style={{fontWeight:500,fontSize:13}}>Comprobantes fiscales *</label>

            </div>
            <CompUploader onAdd={(newItems) => {

                const lineas = newItems.map((it,i) => ({
                  id: Date.now()+i,

          {archivos.length > 0 && (
            <div style={{marginBottom:14}}>
              <div className="card-sub" style={{marginBottom:10}}>{archivos.length} factura{archivos.length>1?"s":""} procesada{archivos.length>1?"s":""} · total detectado: <strong className="mono">{window.fmtMXN(archivos.reduce((a,c)=>a+(c.total||0),0))}</strong></div>
              <div className="table-wrap" style={{border:"none",padding:0}}>
                <table className="t">
                  <thead><tr><th>UUID</th><th>Emisor</th><th>Concepto</th><th className="right">Total</th><th>Cuenta</th><th>Conf.</th><th></th></tr></thead>
                  <tbody>
                    {archivos.map((c,i) => {
                      const meta = window.findCuenta(c.cuenta) || {nombre:c.cuenta,cuenta:c.cuenta};
                      return (
                        <tr key={i}>
                          <td className="id-cell">{c.uuid||"—"}</td>

                          <td className="muted" style={{fontSize:12}}>{c.concepto||"—"}</td>
                          <td className="num">{window.fmtMXN(c.total||0)}</td>

                            <div className="mono muted" style={{fontSize:10}}>{meta.cuenta}</div>
                          </td>
                          <td>

                              <div className={`conf ${c.confianza<0.9?"warn":""}`}>
                                <div className="meter"><div className="fill" style={{width:`${(c.confianza||0)*100}%`}}></div></div>
                                {Math.round((c.confianza||0)*100)}%

                          <td className="right">

                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>

          <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
            <button className="btn ghost" onClick={()=>{setMostrarForm(false);setErrores({});setArchivos([]);}}>Cancelar</button>
            <button className="btn primary" onClick={enviar}>
              <Icon name="arrowR" size={14}/> Enviar a aprobación · {window.fmtMXN(totalDesg)}
            </button>

      <div className="kpi-grid" style={{gridTemplateColumns:"repeat(3, 1fr)"}}>

          <div className="kpi-value">{window.fmtMXN(enFlujo.reduce((a,s)=>a+s.monto,0))}</div>
          <div className="kpi-delta neutral">{enFlujo.length} solicitudes</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Reembolsado este año</div>
          <div className="kpi-value">{window.fmtMXN(liberados.reduce((a,s)=>a+s.monto,0))}</div>
          <div className="kpi-delta up">{liberados.length} solicitudes pagadas</div>
        </div>
        <div className="kpi">
          <div className="kpi-label">Total registradas</div>
          <div className="kpi-value">{solicitudes.length}</div>
          <div className="kpi-delta neutral">todos los periodos</div>
        </div>

      <div className="card">
        <div className="card-head">
          <div>
            <h3 className="card-title">Mis reembolsos</h3>
          </div>
          <div className="row">
            <div className="search" style={{width:200}}>
              <Icon name="search" size={14}/>
              <input placeholder="Buscar…" value={busqueda} onChange={e=>setBusqueda(e.target.value)}/>
            </div>
            <button className="btn sm" onClick={exportar}><Icon name="download" size={12}/> Exportar</button>

        <div className="filterbar" style={{marginBottom:12}}>

}

function TesoreriaBandeja({ openDetail }) {
  const [items, setItems] = React.useState(() => window.SOLICITUDES.filter(s => s.status === "autorizado"));
  const [selected, setSelected] = React.useState(() => new Set(window.SOLICITUDES.filter(s => s.status === "autorizado").map(s => s.id)));
  const [toast, setToast] = React.useState(null);

  const liberar = (ids) => {
    const idsArr = Array.isArray(ids) ? ids : [ids];
    idsArr.forEach(id => {
      const s = window.SOLICITUDES.find(x => x.id === id);
      if (!s) return;

      if (s.tipo === "comprobacion") {
        // Comprobación liberada = comprobado
        s.status = "comprobado";
        // Recalcular saldo del anticipo padre y marcarlo como comprobado si aplica
        if (s.anticipoRef) {
          window.calcSaldo(s.anticipoRef);
          const ant = window.SOLICITUDES.find(x => x.id === s.anticipoRef);
          if (ant && (ant.saldoPendiente || 0) <= 0) {
            ant.status = "comprobado";
          }
        }
      } else if (s.tipo === "reembolso") {
        // Reembolso liberado = liberado (ya se pagó, no hay anticipo que cerrar)
        s.status = "liberado";
      } else if (s.tipo === "anticipo") {
        // Anticipo liberado = fondos dispersados al empleado
        s.status = "liberado";
        s.saldoPendiente = s.monto;
      } else {
        s.status = "liberado";
      }
    });
    setItems(items.filter(i => !idsArr.includes(i.id)));
    const newSel = new Set(selected);
    idsArr.forEach(id => newSel.delete(id));
    setSelected(newSel);
    const total = idsArr.reduce((a, id) => {
      const s = window.SOLICITUDES.find(x => x.id === id);
      return a + (s ? s.monto : 0);
    }, 0);
    setToast(`✓ ${idsArr.length} solicitud${idsArr.length > 1 ? "es" : ""} liberada${idsArr.length > 1 ? "s" : ""} · ${window.fmtMXN(total)} dispersados`);
    setTimeout(() => setToast(null), 3500);
  };

  const toggle = (id) => {
    const ns = new Set(selected);
    if (ns.has(id)) ns.delete(id); else ns.add(id);
    setSelected(ns);
  };

  const toggleAll = () => {
    if (selected.size === items.length) setSelected(new Set());
    else setSelected(new Set(items.map(i => i.id)));
  };

  const [filtroTeso, setFiltroTeso] = React.useState("todas");
  const [busquedaTeso, setBusquedaTeso] = React.useState("");

  const exportarSPEI = () => {
    const sel = items.filter(i => selected.has(i.id));
    const rows = [["Folio","Beneficiario","CLABE","Banco","Monto","Concepto"]];
    sel.forEach(s => {
      const u = window.findUser(s.usuario);
      rows.push([s.id, u.nombre, "••••4392", "BBVA", s.monto, s.concepto]);
    });
    const csv = rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = `layout_spei_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  const countsTeso = {
    anticipo:     items.filter(s=>s.tipo==="anticipo").length,
    comprobacion: items.filter(s=>s.tipo==="comprobacion").length,
    reembolso:    items.filter(s=>s.tipo==="reembolso").length,

  const itemsFiltrados = items
    .filter(s => filtroTeso==="todas" || s.tipo===filtroTeso)
    .filter(s => {
      if (!busquedaTeso.trim()) return true;
      const q = busquedaTeso.toLowerCase();
      const u = window.findUser(s.usuario);
      return s.id.toLowerCase().includes(q) || u.nombre.toLowerCase().includes(q) || s.concepto.toLowerCase().includes(q);
    });

  return (

        </div>
        <div className="row">
          <button className="btn" onClick={exportarSPEI} disabled={selected.size===0}>
            <Icon name="download" size={13}/> Layout SPEI ({selected.size})
          </button>
          <button className="btn primary" disabled={selected.size === 0} onClick={() => liberar([...selected])}>
            <Icon name="cash" size={13}/> Liberar lote ({selected.size})
          </button>
        </div>
      </div>

      {toast && (
        <div style={{position:"fixed", bottom:24, right:24, background:"var(--success-soft)", border:"1px solid oklch(from var(--success) l c h / 0.4)", color:"var(--success)", padding:"12px 18px", borderRadius:"var(--r-lg)", zIndex:100, fontWeight:500, fontSize:13}}>
          {toast}

      <div className="kpi-grid">

        <div className="kpi"><div className="kpi-label">Monto total</div><div className="kpi-value">{window.fmtMXN(items.reduce((a,s)=>a+s.monto,0))}</div><div className="kpi-delta up">listo para SPEI</div></div>

function Reportes() {

    if (String(s.fecha.getFullYear()) !== anio) return false;
    if (centro !== "todos" && u.centro !== centro) return false;
    return true;
  }), [anio, centro]);

  const totalGasto    = solicsFilt.reduce((a,s)=>a+s.monto,0);
  const totalLiberado = solicsFilt.filter(s=>["liberado","comprobado"].includes(s.status)).reduce((a,s)=>a+s.monto,0);
  const totalDeudor   = solicsFilt.filter(s=>s.tipo==="anticipo"&&(s.saldoPendiente||0)>0).reduce((a,s)=>a+(s.saldoPendiente||0),0);
  const totalPend     = solicsFilt.filter(s=>["solicitado","autorizado"].includes(s.status)).reduce((a,s)=>a+s.monto,0);

function ContadorPolizas() {
  const PROVEEDOR_UNICO = "6000000";

  const hoy = window.HOY;
  // Default: últimos 90 días para asegurar datos en el demo
  const fmt = d => d.toISOString().split("T")[0];
  const hace90 = new Date(hoy); hace90.setDate(hace90.getDate() - 90);

  const [fechaIni, setFechaIni] = React.useState(fmt(hace90));
  const [fechaFin, setFechaFin] = React.useState(fmt(hoy));
  const [centro,   setCentro]   = React.useState("todos");
  const [polizas,       setPolizas]       = React.useState([]);
  const [liquidaciones, setLiquidaciones] = React.useState([]);
  const [generado,      setGenerado]      = React.useState(false);

  // Genera las líneas de póliza — SOLO comprobaciones y reembolsos
  const generarPolizas = () => {
    const desde = new Date(fechaIni + "T00:00:00");
    const hasta  = new Date(fechaFin + "T23:59:59");

    const solicitudes = window.SOLICITUDES.filter(s => {
      // Anticipos: solo liberados (Bancos vs Deudor)
      // Comprobaciones y reembolsos: liberados, autorizados o comprobados (Gastos vs Proveedor único)
      if (s.tipo === "anticipo") {
        if (s.status !== "liberado") return false;
      } else if (s.tipo === "comprobacion" || s.tipo === "reembolso") {
        if (s.status === "rechazado" || s.status === "solicitado") return false;
      } else {
        return false;
      }
      if (s.fecha < desde || s.fecha > hasta) return false;
      if (centro !== "todos") {
        const u = window.findUser(s.usuario);
        if (!u || u.centro !== centro) return false;
      }
      return true;
    });

    // Por cada solicitud generar movimientos contables
    const lineas = [];
    let numPoliza = 1;

    solicitudes.forEach(s => {
      const u = window.findUser(s.usuario);
      if (!u) return;
      const c = window.findCentro(u.centro);
      const centroId = c ? c.id : u.centro;

      const fechaFmt = window.fmtFecha(s.fecha);
      const polRef = `POL-${String(numPoliza).padStart(4,"0")}`;

      if (s.tipo === "anticipo") {
        // ── Póliza de ANTICIPO: Bancos vs Deudor ──────────────────────────
        // El número de deudor en SAP es el ID del usuario
        const division    = u.division || "4105";
        const cuentaBanco = window.getBancosAccount(division);
        const cuentaBancoNombre = window.CATALOGO_GASTOS.find(cg => cg.cuenta === cuentaBanco)?.nombre || `Bancos ${division}`;

        // Cargo: cuenta deudor = ID del usuario (número de deudor SAP)
        lineas.push({
          poliza: polRef, folio: s.id, fecha: fechaFmt,
          centro: centroId, area: c ? c.nombre : centroId,
          division,
          cuenta: u.id,        // ID usuario = número deudor SAP
          nombreCuenta: `Deudor ${u.nombre} (${u.id})`,
          tipo: "C", debe: s.monto, haber: 0,
          concepto: `Anticipo viáticos · ${u.nombre} · ${s.concepto}`,
          proveedor: u.nombre, usuario: u.nombre, ref: s.id, _archivos: [],
        });
        // Abono: cuenta de bancos según división del usuario
        lineas.push({
          poliza: polRef, folio: s.id, fecha: fechaFmt,
          centro: centroId, area: c ? c.nombre : centroId,
          division,
          cuenta: cuentaBanco,
          nombreCuenta: cuentaBancoNombre,
          tipo: "A", debe: 0, haber: s.monto,
          concepto: `Anticipo viáticos · ${u.nombre} · ${s.concepto}`,
          proveedor: "—", usuario: u.nombre, ref: s.id,
          _archivos: [],
        });

      } else {
        // ── Póliza de COMPROBACIÓN / REEMBOLSO: Gastos vs Proveedor 6000000 ─

        // Obtener desglose real o estimado
        const items = (() => {
          if (s.cfdi && s.cfdi.length > 0) {
            return s.cfdi.map(cf => ({
              cuenta: cf.cuenta || "6121200001",
              desc:   cf.concepto || cf.emisor || s.concepto,
              monto:  cf.total || 0,
              emisor: cf.emisor || "—",
            }));
          }
          if (s.items && s.items.length > 0) {
            return s.items.map(it => ({
              cuenta: it.cuenta || "6121200001",
              desc:   it.desc || s.concepto,
              monto:  it.monto || 0,
              emisor: "—",
            }));
          }
          return [{ cuenta:"6121200001", desc: s.concepto, monto: s.monto, emisor:"—" }];
        })();

        const totalMov = items.reduce((a,i) => a+i.monto, 0);

        // Cargos: una línea por tipo de gasto
        const divisionComp = u.division || "4105";
        items.forEach(it => {
          if (it.monto <= 0) return;
          const meta = window.findCuenta(it.cuenta) || { nombre: it.cuenta };
          lineas.push({
            poliza: polRef, folio: s.id, fecha: fechaFmt,
            centro: centroId, area: c ? c.nombre : centroId,
            division: divisionComp,
            cuenta: it.cuenta, nombreCuenta: meta.nombre,
            tipo: "C", debe: it.monto, haber: 0,
            concepto: it.desc,
            proveedor: it.emisor !== "—" ? it.emisor : "—",
            usuario: u.nombre, ref: s.id,
          });
        });

        // Abono: proveedor único 6000000
        lineas.push({
          poliza: polRef, folio: s.id, fecha: fechaFmt,
          centro: centroId, area: c ? c.nombre : centroId,
          division: divisionComp,
          cuenta: PROVEEDOR_UNICO, nombreCuenta: "Proveedor Único Viáticos",
          tipo: "A", debe: 0, haber: totalMov,
          concepto: `Viáticos ${u.nombre} · ${s.concepto}`,
          proveedor: `${u.nombre} · ${u.correo}`,
          usuario: u.nombre, ref: s.id,
          _archivos: s.cfdi && s.cfdi.length > 0
            ? s.cfdi.map((cf,i) => ({
                nombre: `${s.id}_${(cf.emisor||"factura").replace(/[^a-zA-Z0-9]/g,"_").slice(0,20)}_${i+1}`,
                uuid: cf.uuid || cf.uuidFull || null,
                emisor: cf.emisor || null,
                total: cf.total || 0,
              }))
            : s.comprobantes > 0
              ? Array.from({length: s.comprobantes}, (_,i) => ({
                  nombre: `${s.id}_comprobante_${i+1}`,
                  uuid: null, emisor: null, total: null,
                }))
              : [],
        });
      }

      numPoliza++;
    });

    setPolizas(lineas);

    // Generar también las pólizas de liquidación para comprobaciones
    const liquidaciones = solicitudes
      .filter(s => s.tipo === "comprobacion" && s.anticipoRef)
      .map(s => window.generarPolizaLiquidacion(s))
      .filter(Boolean);
    setLiquidaciones(liquidaciones);
    setGenerado(true);
  };

  // ── Layout SAP FB50 / RFBIBL00 ─────────────────────────────────────────────
  // El programa RFBIBL00 lee un archivo de texto con posiciones fijas.
  // Cada registro empieza con un identificador de tipo:
  //   BSE = cabecera del documento
  //   BSP = posición individual (línea de asiento)
  //
  // Campos BSE (cabecera):
  //   Col 1-3:   BSEG (tipo "BSE")
  //   Col 5-14:  BUKRS  Sociedad (4 chars)
  //   Col 16-21: BLDAT  Fecha doc  DDMMYY
  //   Col 23-28: BUDAT  Fecha contab DDMMYY
  //   Col 30-31: BLART  Tipo doc (KR=prov, SA=contabilidad gral)
  //   Col 33-37: WAERS  Moneda
  //   Col 39-98: BKTXT  Texto cabecera (60 chars)
  //   Col 100-109: XBLNR Referencia externa (10 chars)
  //
  // Campos BSP (posición):
  //   Col 1-3:   "BSP"
  //   Col 5-14:  HKONT  Cuenta GL (10 chars)
  //   Col 16:    SHKZG  D=Debe / H=Haber
  //   Col 18-32: WRBTR  Importe (15.2, sin punto, último 2=decimales)
  //   Col 34-43: KOSTL  Centro de costo (10 chars)
  //   Col 45-104: SGTXT Texto posición (60 chars)
  //   Col 106-115: ZUONR Asignación (10 chars)

  const getSociedad = () => {
    const el = document.getElementById("sap-bukrs");
    return (el ? el.value.trim().toUpperCase() : "") || "CZAP";
  };

  const padR = (s, n) => String(s||"").substring(0,n).padEnd(n);
  const padL = (s, n) => String(s||"").substring(0,n).padStart(n);
  const fmtFechaSAP = d => {
    const dt = d instanceof Date ? d : new Date(d);
    const dd = String(dt.getDate()).padStart(2,"0");
    const mm = String(dt.getMonth()+1).padStart(2,"0");
    const yy = String(dt.getFullYear()).slice(-2);
    return `${dd}${mm}${yy}`;
  };
  const fmtImporte = n => {
    const abs = Math.abs(Math.round(n * 100));
    return String(abs).padStart(15,"0").replace(/(\d{2})$/, ".$1");
  };

  const exportarSAP = () => {
    const SOCIEDAD = getSociedad();
    // Agrupar todas las lineas (pólizas + liquidaciones) por número de póliza
    const todasLineas = [
      ...polizas,
      ...liquidaciones.flatMap((liq, li) =>
        liq.lineas.map(l => ({
          poliza:    `LIQ-${String(li+1).padStart(4,"0")}`,
          folio:     liq.comprobacionId,
          fecha:     window.fmtFecha(liq.fecha),
          _fechaObj: liq.fecha,
          centro:    polizas.find(p=>p.folio===liq.comprobacionId)?.centro || "",
          cuenta:    l.cuenta,
          tipo:      l.tipo,
          debe:      l.debe || 0,
          haber:     l.haber || 0,
          concepto:  l.concepto,
        }))
      ),
    ];

    const grupos = {};
    todasLineas.forEach(l => {
      if (!grupos[l.poliza]) grupos[l.poliza] = [];
      grupos[l.poliza].push(l);
    });

    const lineasSAP = [];
    lineasSAP.push("* Layout generado por Sistema de Viáticos Casa Zapata");
    lineasSAP.push(`* Sociedad: ${SOCIEDAD}  Rango: ${fechaIni} al ${fechaFin}`);
    lineasSAP.push(`* Pólizas: ${Object.keys(grupos).length}  Fecha: ${new Date().toISOString().slice(0,10)}`);
    lineasSAP.push("");

    Object.entries(grupos).forEach(([numPol, movs]) => {
      const ref = movs[0];
      // Obtener fecha como objeto Date
      // Get fecha from SOLICITUDES — _fechaObj may not be on all lines
      const _sol = window.SOLICITUDES.find(x => x.id === ref.folio);
      const fechaDoc = _sol ? _sol.fecha : (ref._fechaObj || new Date());
      const tipoDoc = numPol.startsWith("LIQ") ? "SA" :
                      ref.cuenta === "1125" || ref.cuenta === "1101" ? "SA" : "KR";
      const fechaSAP = fmtFechaSAP(fechaDoc);
      const textoCab = padR(`Viaticos ${ref.folio} ${ref.area||""}`, 60);
      const refExterna = padR(ref.folio, 10);

      const divisionSAP = movs.find(m => m.division)?.division || "";
      // BSE — cabecera del documento
      // Col adicional: división (referencia interna)
      lineasSAP.push(
        `BSE  ${padR(SOCIEDAD,4)}  ${fechaSAP}  ${fechaSAP}  ${tipoDoc}  MXN  ${textoCab}  ${refExterna}  ${padR(divisionSAP,6)}`
      );

      // BSP — una línea por movimiento
      movs.forEach(m => {
        const cuenta  = padR(m.cuenta, 10);
        const dc      = m.tipo === "C" ? "D" : "H";
        const importe = fmtImporte(m.tipo === "C" ? m.debe : m.haber);
        const kostl   = padR(m.centro || ref.centro, 10);
        const texto   = padR(m.concepto, 60);
        const asign   = padR(m.folio, 10);
        lineasSAP.push(
          `BSP  ${cuenta}  ${dc}  ${importe}  ${kostl}  ${texto}  ${asign}`
        );
      });

      lineasSAP.push(""); // línea en blanco entre documentos
    });

    const content = lineasSAP.join('\n');
    const a = document.createElement("a");
    a.href = "data:text/plain;charset=utf-8," + encodeURIComponent(content);
    a.download = `SAP_FB50_${fechaIni}_${fechaFin}.txt`;
    a.click();
  };

  const exportarPolizas = () => {
    if (!polizas.length) return;
    const rows = [["Póliza","Folio","Fecha","Centro","Área","Cuenta","Nombre cuenta","D/A","Debe","Haber","Concepto","Proveedor / Emisor","Registrado por"]];
    polizas.forEach(p => rows.push([
      p.poliza, p.folio, p.fecha, p.centro, p.area,
      p.cuenta, p.nombreCuenta, p.tipo,
      p.debe || "", p.haber || "",
      p.concepto, p.proveedor, p.usuario,
    ]));
    const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(",")).join('\n');
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    a.download = `polizas_${fechaIni}_${fechaFin}.csv`;
    a.click();
  };

  const totalDebe  = polizas.reduce((a,p)=>a+(p.debe||0),0);
  const totalHaber = polizas.reduce((a,p)=>a+(p.haber||0),0);
  const polizasUnicas = [...new Set(polizas.map(p=>p.poliza))].length;

  return (
    <>
      <div className="page-head">
        <div>
          <h1 className="page-title">Pólizas contables</h1>
          <div className="page-sub">Generación de movimientos contables por rango de fecha y centro de beneficio</div>
        </div>
        {generado && polizas.length > 0 && (
          <div style={{display:"flex",gap:8}}>
            <button className="btn" onClick={exportarPolizas}>
              <Icon name="download" size={13}/> CSV resumen · {polizasUnicas} pólizas
            </button>
            <button className="btn primary" onClick={exportarSAP}>
              <Icon name="download" size={13}/> Layout SAP (FB50)
            </button>
          </div>
        )}
      </div>

      {/* Filtros */}
      <div className="card" style={{marginBottom:16}}>
        <h3 className="card-title" style={{marginBottom:14}}>Parámetros de generación</h3>
        <div className="form-grid cols-2" style={{marginBottom:16}}>
          <div className="field">
            <label>Fecha inicial</label>
            <input className="input" type="date" value={fechaIni}
              onChange={e=>{setFechaIni(e.target.value);setGenerado(false);}}/>
          </div>
          <div className="field">
            <label>Fecha final</label>
            <input className="input" type="date" value={fechaFin}
              onChange={e=>{setFechaFin(e.target.value);setGenerado(false);}}/>
          </div>
          <div className="field">
            <label>Centro de beneficio</label>
            <select className="select" value={centro}
              onChange={e=>{setCentro(e.target.value);setGenerado(false);}}>
              <option value="todos">Todos los centros</option>
              {window.CENTROS.map(c=><option key={c.id} value={c.id}>{c.id} · {c.nombre}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Proveedor acreedor</label>
            <input className="input mono" value={`${PROVEEDOR_UNICO} — Proveedor Único Viáticos`} disabled/>
          </div>
          <div className="field">
            <label>Sociedad SAP (BUKRS)</label>
            <input className="input mono" defaultValue="CZAP"
              placeholder="Ej: CZAP, 1000, MXSA"
              id="sap-bukrs"
              style={{textTransform:"uppercase"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn primary" onClick={generarPolizas}>
            <Icon name="sparkle" size={13}/> Generar pólizas
          </button>
          {generado && (
            <button className="btn" onClick={()=>{setPolizas([]);setLiquidaciones([]);setGenerado(false);}}>
              Limpiar
            </button>
          )}
        </div>
      </div>

      {/* Resultado */}
      {generado && polizas.length === 0 && (
        <div className="card">
          <div className="empty">
            <div className="empty-ic"><Icon name="search" size={20}/></div>
            <div style={{fontWeight:600,fontSize:14,color:"var(--text)"}}>Sin movimientos</div>
            <div style={{marginTop:4}}>No hay solicitudes liberadas en el rango y filtro seleccionado</div>
          </div>
        </div>
      )}

      {generado && polizas.length > 0 && (
        <>
          <div className="kpi-grid">
            <div className="kpi">
              <div className="kpi-label">Pólizas generadas</div>
              <div className="kpi-value">{polizasUnicas}</div>
              <div className="kpi-delta neutral">{polizas.length} movimientos</div>
            </div>
            <div className="kpi">
              <div className="kpi-label">Total debe</div>
              <div className="kpi-value">{window.fmtMXN(totalDebe)}</div>
            </div>
            <div className="kpi">
              <div className="kpi-label">Total haber</div>
              <div className="kpi-value">{window.fmtMXN(totalHaber)}</div>
            </div>
            <div className="kpi">
              <div className="kpi-label">Cuadre</div>
              <div className="kpi-value" style={{color:Math.abs(totalDebe-totalHaber)<0.01?"var(--success)":"var(--danger)"}}>
                {Math.abs(totalDebe-totalHaber)<0.01 ? "✓ Cuadra" : window.fmtMXN(Math.abs(totalDebe-totalHaber))}
              </div>
            </div>
          </div>

          {/* Tabla de pólizas agrupada por póliza */}
          {[...new Set(polizas.map(p=>p.poliza))].map(numPol => {
            const movs = polizas.filter(p=>p.poliza===numPol);
            const ref  = movs[0];
            const totD = movs.reduce((a,p)=>a+(p.debe||0),0);
            const totH = movs.reduce((a,p)=>a+(p.haber||0),0);
            return (
              <div key={numPol} className="card" style={{marginBottom:14,padding:0}}>
                {/* Header de póliza */}
                {(() => {
                  const s = window.SOLICITUDES.find(x=>x.id===ref.folio);
                  const tipoLabel = s && s.tipo==="anticipo" ? "Anticipo · Bancos vs Deudor"
                    : s && s.tipo==="reembolso" ? "Reembolso · Gastos vs Prov. 6000000"
                    : "Comprobación · Gastos vs Prov. 6000000";
                  const tipoColor = s && s.tipo==="anticipo" ? "var(--info)" : "var(--accent)";
                  return (
                    <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",
                      display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",
                      background:"var(--surface-2,rgba(255,255,255,.04))",
                      borderRadius:"var(--r-lg) var(--r-lg) 0 0"}}>
                      <span className="mono" style={{fontWeight:700,fontSize:14}}>{numPol}</span>
                      <span className="badge tipo">{ref.folio}</span>
                      <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,
                        background:`${tipoColor}22`,color:tipoColor,fontWeight:500}}>
                        {tipoLabel}
                      </span>
                      <span className="muted" style={{fontSize:12}}>{ref.fecha}</span>
                      <span className="muted" style={{fontSize:12}}>{ref.area} · {ref.centro}</span>
                      {ref.division && (
                        <span style={{fontSize:11,padding:"1px 7px",borderRadius:20,
                          background:"rgba(255,255,255,.08)",color:"var(--text-2)",fontWeight:500}}>
                          Div. {ref.division}
                        </span>
                      )}
                      <span style={{marginLeft:"auto",fontWeight:600,fontFamily:"var(--f-mono,monospace)"}}>{window.fmtMXN(totD)}</span>
                    </div>
                  );
                })()}

                <table className="t">
                  <thead>
                    <tr>
                      <th>Cuenta</th>
                      <th>Nombre cuenta</th>
                      <th>D/A</th>
                      <th>Concepto</th>
                      <th>Proveedor / Emisor factura</th>
                      <th className="right">Debe</th>
                      <th className="right">Haber</th>
                    </tr>
                  </thead>
                  <tbody>
                    {movs.map((m, i) => (
                      <tr key={i} style={{background: m.tipo==="A" ? "var(--surface-2,rgba(255,255,255,.03))" : "transparent"}}>
                        <td className="mono" style={{fontWeight:600,color: m.tipo==="A"?"var(--info)":"var(--text)"}}>{m.cuenta}</td>
                        <td style={{fontSize:12}}>{m.nombreCuenta}</td>
                        <td>
                          <span className={`badge ${m.tipo==="C"?"solicitado":"autorizado"}`}>
                            <span className="dot"></span>{m.tipo==="C" ? "Cargo" : "Abono"}
                          </span>
                        </td>
                        <td style={{fontSize:12,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.concepto}</td>
                        <td style={{fontSize:12}}>
                          {m.tipo==="C" ? (
                            <EditableCell
                              value={m.proveedor}
                              placeholder="Nombre del proveedor / emisor"
                              onChange={v => {
                                m.proveedor = v;
                                setPolizas([...polizas]);
                              }}
                            />
                          ) : (
                            <span className="muted">{m.proveedor}</span>
                          )}
                        </td>
                        <td className="num" style={{fontFamily:"var(--f-mono,monospace)"}}>{m.debe ? window.fmtMXN(m.debe) : "—"}</td>
                        <td className="num" style={{fontFamily:"var(--f-mono,monospace)",color:"var(--info)"}}>{m.haber ? window.fmtMXN(m.haber) : "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                  <tfoot>
                    <tr style={{borderTop:"1.5px solid var(--border)"}}>
                      <td colSpan={5} style={{padding:"8px 10px",textAlign:"right",fontWeight:600,fontSize:12}}>Totales</td>
                      <td className="num" style={{fontWeight:700}}>{window.fmtMXN(totD)}</td>
                      <td className="num" style={{fontWeight:700,color:"var(--info)"}}>{window.fmtMXN(totH)}</td>
                    </tr>
                  </tfoot>
                </table>

                {/* ── Archivos adjuntos de la póliza ── */}
                {(() => {
                  const abonoLine = movs.find(m => m._archivos);
                  const archivos  = abonoLine ? abonoLine._archivos : [];
                  if (!archivos.length) return null;
                  return (
                    <div style={{padding:"12px 16px",borderTop:"1px solid var(--border)",
                      background:"var(--surface-2,rgba(255,255,255,.03))",
                      borderRadius:"0 0 var(--r-lg) var(--r-lg)"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                        <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.07em",
                          textTransform:"uppercase",color:"var(--text-3)"}}>
                          Comprobantes adjuntos · {archivos.length} archivo{archivos.length>1?"s":""}
                        </div>
                        <button className="btn sm" onClick={() => descargarTodosAdjuntos(ref.folio, ref.folio)}
                          style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11}}>
                          <Icon name="download" size={11}/>
                          Descargar todos ({archivos.length * 2} archivos)
                        </button>
                      </div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                        {/* XML por cada factura */}
                        {archivos.map((f,i) => {
                          const xmlContent = f.uuid
                            ? `<?xml version="1.0" encoding="UTF-8"?>
<Comprobante xmlns="http://www.sat.gob.mx/cfd/4"
  UUID="${f.uuid}"
  NombreEmisor="${f.emisor||""}"
  Total="${f.total||0}"
  Folio="${ref.folio}"/>`
                            : `<?xml version="1.0" encoding="UTF-8"?>
<Comprobante Folio="${ref.folio}" Archivo="${i+1}"/>`;
                          return (
                            <React.Fragment key={i}>
                              {/* Botón XML */}
                              <button
                                onClick={() => {
                                  const a = document.createElement("a");
                                  a.href = "data:application/xml;charset=utf-8," + encodeURIComponent(xmlContent);
                                  a.download = `${f.nombre}.xml`;
                                  a.click();
                                }}
                                style={{
                                  display:"inline-flex",alignItems:"center",gap:7,
                                  padding:"6px 11px",borderRadius:"var(--r-md,8px)",
                                  border:"1px solid var(--border)",
                                  background:"var(--surface-1,rgba(255,255,255,.06))",

// Campo editable inline para el nombre del proveedor en pólizas
function EditableCell({ value, placeholder, onChange }) {
  const [editing, setEditing] = React.useState(false);
  const [val, setVal]         = React.useState(value || "");
  if (editing) {
    return (
      <input
        autoFocus
        className="input"
        style={{padding:"3px 6px",fontSize:12,height:28,minWidth:180}}
        value={val}
        placeholder={placeholder}
        onChange={e => setVal(e.target.value)}
        onBlur={() => { onChange(val); setEditing(false); }}
        onKeyDown={e => { if(e.key==="Enter"){onChange(val);setEditing(false);} if(e.key==="Escape")setEditing(false); }}
      />
    );
  }
  return (
    <span
      onClick={() => setEditing(true)}
      title="Clic para editar el nombre del proveedor"
      style={{cursor:"pointer",fontSize:12,
        color: val && val!=="—" ? "var(--text)" : "var(--text-3)",
        borderBottom:"1px dashed var(--border)",paddingBottom:1}}>
      {val && val!=="—" ? val : <span style={{fontStyle:"italic",opacity:.6}}>+ Agregar proveedor</span>}
    </span>
  );
}


// ── Descarga todos los adjuntos de una solicitud ────────────────────────────
function descargarTodosAdjuntos(solicitudId, folio) {
  const s = window.SOLICITUDES.find(x => x.id === (solicitudId || folio));
  const archivos = s && s.cfdi && s.cfdi.length > 0
    ? s.cfdi.map((cf, i) => ({
        nombre: `${(s||{}).id||folio}_${(cf.emisor||"factura").replace(/[^a-zA-Z0-9]/g,"_").slice(0,20)}_${i+1}`,
        uuid: cf.uuid || cf.uuidFull || null, emisor: cf.emisor || null, total: cf.total || 0,
      }))
    : s && s.comprobantes > 0
      ? Array.from({length: s.comprobantes}, (_,i) => ({
          nombre: `${(s||{}).id||folio}_comprobante_${i+1}`,
          uuid: null, emisor: null, total: null,
        }))
      : [];
  if (!archivos.length) { alert("No hay comprobantes adjuntos registrados en esta solicitud."); return; }
  archivos.forEach((f, i) => {
    setTimeout(() => {
      const xmlContent = f.uuid
        ? `<?xml version="1.0" encoding="UTF-8"?><Comprobante UUID="${f.uuid}" Emisor="${f.emisor||""}" Total="${f.total||0}" Folio="${folio}"/>`
        : `<?xml version="1.0" encoding="UTF-8"?><Comprobante Folio="${folio}" Archivo="${i+1}"/>`;
      const ax = document.createElement("a");
      ax.href = "data:application/xml;charset=utf-8," + encodeURIComponent(xmlContent);
      ax.download = `${f.nombre}.xml`; ax.click();
      setTimeout(() => {
        const pdfText = [`%PDF-1.4`,`% UUID: ${f.uuid||"—"}`,`% Emisor: ${f.emisor||"—"}`,`% Total: $${f.total||0}`].join("\n");
        const ap = document.createElement("a");
        ap.href = "data:application/pdf;charset=utf-8," + encodeURIComponent(pdfText);
        ap.download = `${f.nombre}.pdf`; ap.click();
      }, 300);
    }, i * 800);
  });
}

      iva: cf.iva||0, subtotal: cf.subtotal||0, isCFDI: true,
    }));
    const raw = s.items||s.desglose||[];
    if (raw.length > 0) return raw.map(it => ({
      cuenta: it.cuenta||it.code||it.expCode||"6121200001",
      desc: it.desc||it.nombre||it.concepto||"—",
      monto: parseFloat(it.amt||it.monto||it.total||0), isCFDI: false,
    }));
    const total = s.monto||0;
    if (s.tipo==="anticipo") return [
      {cuenta:"6122900001",desc:"Pasajes (estimado)",monto:Math.round(total*0.40),isCFDI:false},
      {cuenta:"6122900003",desc:"Hospedaje (estimado)",monto:Math.round(total*0.35),isCFDI:false},
      {cuenta:"6122900005",desc:"Comidas (estimado)",monto:Math.round(total*0.20),isCFDI:false},

    rows.push(["","","TOTAL",totalLineas,""]);

    const a=document.createElement("a");

                <div><div style={{fontSize:13}}>{u.nombre}</div>
                  <div className="muted mono" style={{fontSize:11}}>{u.correo}</div></div>
              </div>
            </div>
            <div className="field"><label>Centro</label>
              <div>{c?c.nombre:u.centro}<div className="muted mono" style={{fontSize:11}}>{c?c.id:""}</div></div>
            </div>
            <div className="field"><label>Monto</label>
              <div className="mono" style={{fontSize:20,fontWeight:700}}>{window.fmtMXN(s.monto)}</div>
            </div>
          </div>

          {lineas.length > 0 && (
            <>
              <div className="divider"></div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>

// ── MobileScan — lector CFDI real para la vista móvil ────────────────────────
function MobileScan({ userId, onDone }) {
  const [facturas, setFacturas] = React.useState([]);
  const [enviado, setEnviado]   = React.useState(false);
  const [concepto, setConcepto] = React.useState("");
  const [toast, setToast]       = React.useState(null);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

  const handleFile = (e) => {
    const files = Array.from(e.target.files || []);
    files.forEach(file => {
      if (!file.name.toLowerCase().endsWith(".xml")) {
        // Non-XML: add as plain attachment
        setFacturas(prev => [...prev, {
          nombre: file.name, emisor: file.name, concepto: file.name,
          total: 0, cuenta: "6121200001", confianza: 0, isCFDI: false
        }]);
        return;
      }
      const reader = new FileReader();
      reader.onload = (ev) => {
        const txt = ev.target.result;
        // Use the parseCFDI logic inline (simplified, same as CompUploader)
        try {
          const doc = new DOMParser().parseFromString(txt, "application/xml");
          if (doc.querySelector("parsererror")) { showToast("XML inválido: " + file.name); return; }
          const qn = (parent, localName) => {
            let el = parent.querySelector(localName);
            if (el) return el;
            const all = parent.getElementsByTagName("*");
            for (let i = 0; i < all.length; i++) if (all[i].localName === localName) return all[i];
            return null;
          };
          const attr = (el, ...names) => {
            if (!el) return "";
            for (const n of names) {
              const v = el.getAttribute(n) || el.getAttribute(n.toLowerCase()) || el.getAttribute(n[0].toUpperCase()+n.slice(1));
              if (v) return v;
            }
            return "";
          };
          const comp = qn(doc, "Comprobante") || doc.documentElement;
          const total    = parseFloat(attr(comp, "Total", "total") || "0");
          const subtotal = parseFloat(attr(comp, "SubTotal","Subtotal","subtotal") || "0");
          const emisorEl = qn(doc, "Emisor");
          const emisor   = attr(emisorEl, "Nombre","nombre") || attr(emisorEl, "Rfc","rfc") || "";
          const conceptoEls = Array.from(doc.getElementsByTagName("*")).filter(e => e.localName === "Concepto");
          const conceptoStr = conceptoEls.map(c => attr(c,"Descripcion","descripcion")).filter(Boolean).join(" · ").slice(0,80) || "—";
          const tfd  = Array.from(doc.getElementsByTagName("*")).find(e => e.localName === "TimbreFiscalDigital");
          const uuid = tfd ? (attr(tfd,"UUID","uuid") || "").toUpperCase() : "";
          let iva = 0;
          Array.from(doc.getElementsByTagName("*")).filter(e=>e.localName==="Traslado").forEach(t=>{
            const imp = attr(t,"Impuesto","impuesto");
            if (imp==="002"||imp.toUpperCase()==="IVA") iva += parseFloat(attr(t,"Importe","importe")||"0")||0;
          });
          if (!iva && total && subtotal) iva = Math.round((total-subtotal)*100)/100;

          // Classify
          const text = (emisor+" "+conceptoStr).toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
          let cuenta = "6121200001", confianza = 0.5;
          if (/(pemex|gasolina|magna|premium|diesel|combustible)/.test(text)) { cuenta="6120800001"; confianza=0.96; }
          else if (/(aeromexico|volaris|vivaaerobus|vuelo|pasaje aereo|boleto)/.test(text)) { cuenta="6122900001"; confianza=0.96; }
          else if (/(tua|asur|aifa|oma|gap aeropuertos)/.test(text)) { cuenta="6122700001"; confianza=0.95; }
          else if (/(hotel|hospedaje|marriott|fiesta inn|holiday|city express|camino real|hilton)/.test(text)) { cuenta="6122900003"; confianza=0.95; }
          else if (/(restaurante|comida|alimento|cafeteria|cena|desayuno)/.test(text)) { cuenta="6122900005"; confianza=0.93; }
          else if (/(caseta|peaje|capufe|autopista)/.test(text)) { cuenta="6122900002"; confianza=0.95; }
          else if (/(estacionamiento|parking)/.test(text)) { cuenta="6122900004"; confianza=0.94; }
          else if (/(hertz|sixt|avis|alamo|renta de auto|renta vehicular)/.test(text)) { cuenta="6122900006"; confianza=0.94; }

          const meta = window.findCuenta(cuenta) || { nombre: cuenta };
          setFacturas(prev => [...prev, {
            nombre: file.name, uuid: uuid.slice(0,18)+(uuid.length>18?"…":""),
            emisor, concepto: conceptoStr, subtotal: Math.round(subtotal*100)/100,
            iva: Math.round(iva*100)/100, total: Math.round(total*100)/100,
            cuenta, nombreCuenta: meta.nombre, confianza, isCFDI: true,
          }]);
        } catch(err) { showToast("Error al leer: " + file.name); }
      };
      reader.readAsText(file, "utf-8");
    });
    e.target.value = "";
  };

  const enviarReembolso = () => {
    if (!facturas.length) { showToast("Sube al menos una factura"); return; }
    const total = facturas.reduce((a,f)=>a+(f.total||0),0);
    const id = "REE-" + Date.now().toString().slice(-6);
    window.SOLICITUDES.unshift({
      id, tipo:"reembolso",
      concepto: concepto.trim() || facturas.map(f=>f.emisor).filter(Boolean).join(", ").slice(0,80),
      usuario: userId, monto: total, fecha: new Date(),
      status:"solicitado", comprobantes: facturas.length, cfdi: facturas,
    });
    showToast("✓ Reembolso " + id + " enviado");
    setEnviado(true);
    setTimeout(() => onDone && onDone(), 1500);
  };

  const labelStyle = {fontSize:10,fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",
    color:"var(--text-3,rgba(255,255,255,.4))",display:"block",marginBottom:6};
  const chipStyle  = (ok) => ({padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:500,
    background:ok?"var(--success-soft,#e1f5ee)":"var(--warn-soft,#faeeda)",
    color:ok?"var(--success,#1d9e75)":"var(--warn,#ef9f27)"});

  return (
    <div>
      {toast && (
        <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",zIndex:500,
          background:"var(--accent,#c5f24d)",color:"var(--accent-fg,#0a0b0f)",
          padding:"8px 16px",borderRadius:20,fontSize:12,fontWeight:500,whiteSpace:"nowrap"}}>
          {toast}
        </div>
      )}

      {/* Drop zone / selector */}
      <div className="dropzone" style={{padding:24,marginBottom:14,cursor:"pointer"}}
        onClick={() => document.getElementById("m-file-input").click()}>
        <div className="dropzone-icon"><Icon name="upload" size={22}/></div>
        <div className="dropzone-title">Toca para seleccionar XML o foto</div>
        <div className="dropzone-sub">XML · PDF · JPG — detectamos RFC, monto e IVA</div>
      </div>
      <input id="m-file-input" type="file" multiple accept=".xml,.pdf,.jpg,.jpeg,.png"
        style={{display:"none"}} onChange={handleFile}/>

      {/* Facturas procesadas */}
      {facturas.map((f, i) => (
        <div key={i} className="m-card" style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:600,flex:1,marginRight:8,
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.nombre}</div>
            <button onClick={()=>setFacturas(prev=>prev.filter((_,j)=>j!==i))}
              style={{background:"none",border:"none",color:"var(--text-3)",cursor:"pointer",
                fontSize:16,lineHeight:1,padding:"0 2px"}}>×</button>
          </div>

          {f.isCFDI ? (
            <>
              <div className="spread" style={{padding:"3px 0"}}>
                <span className="muted" style={{fontSize:11}}>Emisor</span>
                <strong style={{fontSize:12}}>{f.emisor||"—"}</strong>
              </div>
              <div className="spread" style={{padding:"3px 0"}}>
                <span className="muted" style={{fontSize:11}}>Total</span>
                <strong className="mono" style={{fontSize:13}}>{window.fmtMXN(f.total)}</strong>
              </div>
              <div className="spread" style={{padding:"3px 0"}}>
                <span className="muted" style={{fontSize:11}}>IVA</span>
                <strong className="mono" style={{fontSize:12}}>{window.fmtMXN(f.iva)}</strong>
              </div>
              <div style={{marginTop:8,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontSize:11,fontWeight:600}}>{f.nombreCuenta}</div>
                  <div style={{fontFamily:"monospace",fontSize:10,color:"var(--text-3)"}}>{f.cuenta}</div>
                </div>
                <span style={chipStyle(f.confianza>=0.85)}>
                  {Math.round(f.confianza*100)}% {f.confianza>=0.85?"✓":"revisar"}
                </span>
              </div>
              {/* Selector de cuenta si confianza baja */}
              {f.confianza < 0.85 && (
                <select style={{width:"100%",marginTop:8,padding:"6px 8px",fontSize:12,
                  border:"1px solid var(--border)",borderRadius:8,
                  background:"var(--surface-2)",color:"var(--text)",fontFamily:"inherit"}}
                  value={f.cuenta}
                  onChange={e=>{
                    const updated=[...facturas];
                    const meta=window.findCuenta(e.target.value)||{nombre:e.target.value};
                    updated[i]={...updated[i],cuenta:e.target.value,nombreCuenta:meta.nombre,confianza:1};
                    setFacturas(updated);
                  }}>
                  {window.CATALOGO_GASTOS.filter(c=>c.grupo!=="Activo").map(c=>(
                    <option key={c.cuenta} value={c.cuenta}>{c.cuenta} · {c.nombre}</option>
                  ))}
                </select>
              )}
            </>
          ) : (
            <div className="muted" style={{fontSize:12}}>Archivo adjunto (no XML)</div>
          )}
        </div>
      ))}

      {facturas.length > 0 && (
        <>
          <div style={{marginBottom:12}}>
            <span style={labelStyle}>Concepto del reembolso</span>
            <input style={{width:"100%",padding:"8px 10px",fontSize:13,
              border:"1px solid var(--border)",borderRadius:8,
              background:"var(--surface-2)",color:"var(--text)",
              fontFamily:"inherit",boxSizing:"border-box"}}
              placeholder="Descripción breve del gasto…"
              value={concepto} onChange={e=>setConcepto(e.target.value)}/>
          </div>
          <div style={{padding:"10px 14px",background:"var(--surface-2,rgba(255,255,255,.06))",
            borderRadius:8,marginBottom:12,display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:13}}>Total a reembolsar</span>
            <strong className="mono">{window.fmtMXN(facturas.reduce((a,f)=>a+(f.total||0),0))}</strong>
          </div>
          <button className="btn primary"
            style={{width:"100%",justifyContent:"center",opacity:enviado?0.5:1,
              pointerEvents:enviado?"none":"auto"}}
            onClick={enviarReembolso}>
            <Icon name="arrowR" size={14}/> {enviado ? "Enviado ✓" : "Enviar como reembolso"}
          </button>
          <button className="btn" style={{width:"100%",justifyContent:"center",marginTop:8}}
            onClick={() => setFacturas([])}>
            Limpiar
          </button>
        </>
      )}
    </div>
  );
}

function applyTokens(t) {
  const root = document.documentElement;
  const a = ACCENTS[t.accent] || ACCENTS.lime;
  root.style.setProperty("--accent", a.v);
  root.style.setProperty("--accent-2", a.v2);

function resolveContent(role, page, userId, setDetailId, setPage, onLogout) {
  // Perfil — disponible para todos
  if (page === "perfil") return <window.PerfilPage userId={userId} onLogout={onLogout}/>;

  if (role === "usuario") {
    if (page === "dash")           return <UserDashboard userId={userId} openDetail={setDetailId} setPage={setPage}/>;
    if (page === "anticipos")      return <SolicitarAnticipo setPage={setPage}/>;
    if (page === "comprobaciones") return <NuevaComprobacion setPage={setPage}/>;
    if (page === "reembolsos")     return <Reembolsos userId={userId}/>;
    // fallback
    return <UserDashboard userId={userId} openDetail={setDetailId} setPage={setPage}/>;
  }

  if (role === "gerente") {
    if (page === "bandeja")          return <GerenteBandeja openDetail={setDetailId}/>;
    if (page === "reportes")         return <Reportes/>;
    if (page === "equipo")           return <GerenteEquipo/>;
    if (page === "historial")        return <GerenteHistorial openDetail={setDetailId}/>;
    if (page === "mis-solicitudes")  return <UserDashboard userId={userId} openDetail={setDetailId} setPage={setPage}/>;
    if (page === "anticipos")        return <SolicitarAnticipo setPage={setPage}/>;
    if (page === "reembolsos")       return <Reembolsos userId={userId}/>;
    if (page === "comprobaciones")   return <NuevaComprobacion setPage={setPage} userId={userId}/>;
    return <GerenteBandeja openDetail={setDetailId}/>;
  }

  if (role === "tesoreria") {
    if (page === "liberacion") return <TesoreriaBandeja openDetail={setDetailId}/>;
    if (page === "pagados")    return <TesoreriaPagados openDetail={setDetailId}/>;
    if (page === "deudores")   return <Deudores/>;
    if (page === "reportes")   return <Reportes/>;
    return <TesoreriaBandeja openDetail={setDetailId}/>;
  }

  if (role === "admin") {
    if (page === "usuarios")  return <AdminUsuarios/>;
    if (page === "centros")   return <AdminCentros/>;
    if (page === "catalogo")  return <AdminCatalogo/>;
    if (page === "reportes")  return <Reportes/>;
    if (page === "ajustes")   return <AdminAjustes/>;
    return <AdminUsuarios/>;
  }
  if (role === "contador") {
    if (page === "polizas")   return <ContadorPolizas/>;
    if (page === "catalogo")  return <AdminCatalogo/>;
    return <ContadorPolizas/>;
  }

  return null;
}
